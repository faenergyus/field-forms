<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png?v=3">
  <title>AVO Inspection Report</title>
  <!-- Canonical shared auth helper: exchanges the ~1h Google JWT for the 30-day
       fae1.* session token (POST /auth/session) + auto-401-retry. Loaded BEFORE
       the app script so the resume path's load() can use it. This is the fix for
       the report showing NO DATA after ~1h (expired raw-credential -> 401). -->
  <script src="https://admin.40ac.us/fae-auth.js?v=1"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f1; color: #1a1a1a; min-height: 100vh; }
    .page { max-width: 1020px; margin: 0 auto; padding: 18px 18px 60px; }
    .toolbar {
      display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .toolbar label { font-size: 0.78rem; font-weight: 600; color: #565c63; }
    .toolbar select {
      padding: 7px 10px; font-size: 0.85rem; border: 1.5px solid #d0d4d8; border-radius: 6px; background: #fff;
    }
    .toolbar .summary { margin-left: auto; font-size: 0.78rem; color: #6b7177; }
    .toolbar .summary b { color: #2b3036; }
    .report-card {
      background: #fff; border-radius: 9px; padding: 0;
      border: 1px solid #d8dadd; border-top: 3px solid #5b626b; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left; padding: 8px 9px; background: #f3f7f3;
      border-bottom: 1.5px solid #d8dadd; white-space: nowrap;
      font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.06em; color: #565c63;
    }
    td { padding: 8px 9px; border-bottom: 1px solid #eef2ee; vertical-align: top; white-space: nowrap; }
    /* Pack the short columns tight to the left; let the Unit/Item column absorb
       the remaining width so cells aren't stretched far apart. */
    th.col-item, td.col-item { width: 100%; white-space: normal; }
    /* The expandable detail row spans all columns — let it wrap normally. */
    tr.detail td, td.state-msg { white-space: normal; }
    tr.row { cursor: pointer; }
    tr.row:hover td { background: #f8fbf8; }
    tr.detail { display: none; background: #f9faf7; }
    tr.detail.open { display: table-row; }
    tr.detail td { padding: 14px 18px; border-bottom: 1px solid #d8dadd; }
    .detail-grid { display: grid; grid-template-columns: 140px 1fr; gap: 6px 14px; font-size: 0.82rem; }
    .detail-grid .lbl { color: #5a7a5a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.7rem; padding-top: 3px; }
    .detail-grid .val { color: #1a2a1a; white-space: pre-wrap; }
    .detail-grid .val.empty { color: #b0b0b0; font-style: italic; }
    .badge { display: inline-block; padding: 1px 7px; font-size: 0.7rem; border-radius: 9px; font-weight: 600; }
    .badge.yes { background: #fdebec; color: #a23022; }
    .badge.no  { background: #eef0f2; color: #444a50; }
    .src-pill { font-size: 0.62rem; padding: 1px 6px; border-radius: 9px; background: #eef2ee; color: #5a7a5a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .src-form { background: #e8f3ff; color: #1c4a8a; }
    .state-msg { color: #6b7177; font-size: 0.88rem; padding: 30px 0; text-align: center; }
    .state-msg.err { color: #c0392b; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #4a5158; border-top-color:transparent; border-radius:50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Login overlay */
    #login-overlay { position: fixed; inset: 0; z-index: 9999; background: #0d260d; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    #login-overlay .login-logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; color: #5b626b; }
    #login-overlay .login-logo span { color: #fff; font-weight: 300; }
    #login-overlay .login-tagline { color: #90bc90; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; margin-top: -16px; }
    #login-overlay .login-title { color: #c8dcc8; font-size: 1rem; margin-bottom: 8px; }
    #login-overlay .login-error { color: #ff8080; font-size: 0.85rem; display: none; text-align: center; max-width: 280px; }
  </style>
  <link rel="stylesheet" href="chrome.css">
  <script src="chrome.js" defer></script>
  <script>
    (function () {
      var SITE = location.host.split('.')[0];
      function readPos() { var m = document.cookie.match(/(?:^|; )fae40_pos=([^;]+)/); if (!m) return {}; try { return JSON.parse(decodeURIComponent(m[1])); } catch (e) { return {}; } }
      function writePos(o) { document.cookie = 'fae40_pos=' + encodeURIComponent(JSON.stringify(o)) + '; domain=.40ac.us; path=/; max-age=2592000; Secure; SameSite=Lax'; }
      var pos = readPos();
      pos[SITE] = location.pathname + location.search;
      writePos(pos);
      function patchLinks() {
        document.querySelectorAll('a[href]').forEach(function (a) {
          var m = a.href.match(/^https:\/\/(analyst|scada|forms)\.40ac\.us\/?(?:[?#]|$)/);
          if (m && m[1] !== SITE && pos[m[1]]) { a.href = 'https://' + m[1] + '.40ac.us' + pos[m[1]]; }
        });
      }
      if (document.readyState !== 'loading') patchLinks();
      else document.addEventListener('DOMContentLoaded', patchLinks);
    })();
  </script>
</head>
<body>

<div id="login-overlay">
  <div><div class="login-logo">fae<span>II</span></div></div>
  <div class="login-tagline">forty acres <em>energy</em> &nbsp;·&nbsp; Field Operations Portal</div>
  <div class="login-title">Sign in to continue</div>
  <div id="g_id_onload"
       data-client_id="629380732564-eh0uasomqjdo3up8o2po685g9ep544iq.apps.googleusercontent.com"
       data-callback="handleCredentialResponse"
       data-auto_select="true" data-itp_support="true" data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_blue" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
  <div class="login-error" id="login-error"></div>
</div>

<header class="appchrome">
  <a href="index.html"><img class="logo" src="light-40aclogo.png" alt="Forty Acres Energy" onerror="this.style.display='none'"></a>
  <span class="fae-appnav" data-current="forms"></span>
  <div class="price" id="price-ticker">
    <div class="pi"><span class="pl">WTI Crude</span>
      <span><span id="wti-val" class="pv">&mdash;</span><span id="wti-chg" class="price-chg"></span></span>
      <span id="wti-date" class="price-date"></span></div>
    <div class="pi"><span class="pl">Waha Hub</span>
      <span><span id="waha-val" class="pv">&mdash;</span><span id="waha-chg" class="price-chg"></span></span>
      <span id="waha-date" class="price-date"></span></div>
  </div>
  <div class="user-badge" id="user-badge" style="display:none">
    <img class="user-avatar" id="user-avatar" src="" alt="">
    <span class="user-name" id="user-name"></span>
    <button class="user-signout" onclick="faeSignOut()">sign out</button>
  </div>
</header>
<div class="appchrome-title">
  <h1><span class="h-icon"><img src="sensory.png" alt=""></span>AVO Inspection Report</h1>
  <button class="cancel-btn" onclick="location.href='index.html'" title="Close">Close</button>
</div>

<div class="page">

  <div class="toolbar">
    <label>Window:</label>
    <select id="daysSelect">
      <option value="7">Past 7 days</option>
      <option value="30" selected>Past 30 days</option>
      <option value="90">Past 90 days</option>
      <option value="365">Past year</option>
    </select>
    <label>Source:</label>
    <select id="sourceSelect">
      <option value="">All sources</option>
      <option value="form">Form (manual)</option>
      <option value="xlsx">Saryx xlsx</option>
      <option value="csv">CSV ingest</option>
    </select>
    <label>Hits only:</label>
    <select id="hitsSelect">
      <option value="">All inspections</option>
      <option value="any">Any Yes</option>
      <option value="odor">Odor = Yes</option>
      <option value="leaks">Leaks = Yes</option>
      <option value="noises">Noises = Yes</option>
    </select>
    <div class="summary" id="summary"></div>
  </div>

  <div class="report-card">
    <table id="tbl">
      <thead>
        <tr>
          <th>Date</th>
          <th>Inspector</th>
          <th class="col-item">Unit / Item</th>
          <th>Battery</th>
          <th>Route</th>
          <th>Odor</th>
          <th>Leaks</th>
          <th>Noises</th>
          <th>Due Date</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="10" class="state-msg"><span class="spinner"></span>Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const SESSION_KEY = 'fae_user';
const SESSION_HRS = 720;
const ACCOUNTS_CSV = 'https://docs.google.com/spreadsheets/d/146yuHYjs3RF3wtCK3Qj9NXH94DrStwhieTGqPeLQRfA/gviz/tq?tqx=out:csv&sheet=Accounts';
const API_BASE = 'https://api.40ac.us';

(function () {
  try {
    var m = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    if (m && !localStorage.getItem(SESSION_KEY))
      localStorage.setItem(SESSION_KEY, decodeURIComponent(m[1]));
  } catch (e) {}
  try {
    var _set = localStorage.setItem.bind(localStorage);
    var _rem = localStorage.removeItem.bind(localStorage);
    localStorage.setItem = function (k, v) {
      _set(k, v);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=' + encodeURIComponent(v) + ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax'; } catch (e) {} }
    };
    localStorage.removeItem = function (k) {
      _rem(k);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=;domain=.40ac.us;path=/;max-age=0;Secure;SameSite=Lax'; } catch (e) {} }
    };
  } catch (e) {}
})();

function parseAccountsCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.match(/("(?:[^"]|"")*"|[^,]*)/g).map(c => c.replace(/^"|"$/g,'').trim());
    return { email: cols[0], displayName: cols[1], pbiName: cols[2], role: cols[3] };
  });
}

async function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email   = payload.email.toLowerCase();
  const errorEl = document.getElementById('login-error');
  errorEl.style.cssText = 'display:block;color:#90bc90';
  errorEl.textContent   = 'Checking access…';
  try {
    const rows  = parseAccountsCSV(await fetch(ACCOUNTS_CSV).then(r => r.text()));
    const match = rows.find(r => r.email.toLowerCase() === email && r.email !== 'x');
    if (!match) {
      errorEl.style.color = '#ff8080';
      errorEl.textContent = `Access denied for ${email}. Contact Ryan Swift to request access.`;
      return;
    }
    const session = {
      email, displayName: match.displayName, pbiName: match.pbiName,
      role: match.role, picture: payload.picture,
      credential: response.credential,
      expires: Date.now() + SESSION_HRS * 3600000
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    showApp(session);
  } catch(e) {
    errorEl.style.color = '#ff8080';
    errorEl.textContent = 'Could not verify access. Check your connection and try again.';
  }
}

function showApp(session) {
  document.getElementById('login-overlay').style.display = 'none';
  initApp(session);
}

(function () {
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    if (saved) {
      const s = JSON.parse(saved);
      if (s.expires > Date.now()) { showApp(s); return; }
      localStorage.removeItem(SESSION_KEY);
    }
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
})();

let currentSession = null;
let allRows = [];
// item-name -> { battery, due } from /avo/due (loaded once, not date-windowed).
let dueByItem = null;

// Normalize a unit/facility name for matching inspection.item against the
// avo_required well_name / fac_name (uppercase, collapse internal whitespace).
function normName(s) {
  return String(s == null ? '' : s).toUpperCase().replace(/\s+/g, ' ').trim();
}

// Load the Battery (facility) + next Due Date per well from /avo/due once and
// index it by normalized name so the report can show those columns. /avo/recent
// carries neither field; /avo/due (dbo.avo_required) has fac_name + next_due_date
// per well. Best-effort: failure just leaves the columns blank.
async function loadDueMap() {
  if (dueByItem) return dueByItem;
  const map = {};
  try {
    const r = await window.faeAuth.fetchAuthed(
      API_BASE, API_BASE + '/avo/due?within_days=365');
    if (r.ok) {
      const rows = await r.json();
      (Array.isArray(rows) ? rows : []).forEach(w => {
        const battery = w.fac_name || '';
        const due = w.next_due_date || '';
        const put = (name) => {
          const k = normName(name);
          if (!k) return;
          // Prefer a row that actually has a due date if duplicates collide.
          if (!map[k] || (due && !map[k].due)) map[k] = { battery, due };
        };
        put(w.well_name);
        if (battery && !map[normName(battery)]) put(battery);
      });
    }
  } catch (e) { console.warn('due-map fetch failed', e); }
  dueByItem = map;
  return map;
}

function initApp(session) {
  currentSession = session;
  document.getElementById('daysSelect').addEventListener('change', load);
  document.getElementById('sourceSelect').addEventListener('change', render);
  document.getElementById('hitsSelect').addEventListener('change', render);
  load();
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDt(d, dt) {
  if (!d && !dt) return '—';
  // Prefer the datetime, fall back to just date
  const src = dt || d;
  try {
    const dObj = new Date(src);
    if (!isNaN(dObj)) {
      const mo = dObj.getMonth() + 1;
      const da = dObj.getDate();
      const yr = String(dObj.getFullYear()).slice(2);
      if (dt) {
        const hh = String(dObj.getHours()).padStart(2,'0');
        const mm = String(dObj.getMinutes()).padStart(2,'0');
        return `${mo}/${da}/${yr} ${hh}:${mm}`;
      }
      return `${mo}/${da}/${yr}`;
    }
  } catch (e) {}
  return src;
}

function yn(v) {
  if (!v) return '<span class="badge no">—</span>';
  const t = String(v).trim().toLowerCase();
  if (t === 'yes' || t === 'y' || t === 'true' || t === '1')
    return '<span class="badge yes">Yes</span>';
  if (t === 'no'  || t === 'n' || t === 'false' || t === '0')
    return '<span class="badge no">No</span>';
  return esc(v);
}

function isYes(v) { return /^(yes|y|true|1)$/i.test(String(v || '').trim()); }

async function load() {
  const days = document.getElementById('daysSelect').value;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="10" class="state-msg"><span class="spinner"></span>Loading...</td></tr>';
  try {
    // fetchAuthed exchanges the Google JWT for the long-lived fae token and
    // auto-retries on 401 — fixes the report going blank after ~1h.
    const [r] = await Promise.all([
      window.faeAuth.fetchAuthed(API_BASE, API_BASE + '/avo/recent?days=' + encodeURIComponent(days)),
      loadDueMap(),
    ]);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allRows = await r.json();
    render();
  } catch (err) {
    tbody.innerHTML = '<tr><td colspan="10" class="state-msg err">Error loading inspections: ' + esc(err.message || err) + '</td></tr>';
  }
}

function render() {
  const tbody = document.getElementById('tbody');
  const summary = document.getElementById('summary');
  const srcFilter = document.getElementById('sourceSelect').value;
  const hitFilter = document.getElementById('hitsSelect').value;

  let rows = allRows.slice();
  if (srcFilter) rows = rows.filter(r => (r.source || '').toLowerCase() === srcFilter);
  if (hitFilter === 'any') rows = rows.filter(r => isYes(r.odor_detected) || isYes(r.leaks_observed) || isYes(r.noises_heard));
  else if (hitFilter === 'odor')   rows = rows.filter(r => isYes(r.odor_detected));
  else if (hitFilter === 'leaks')  rows = rows.filter(r => isYes(r.leaks_observed));
  else if (hitFilter === 'noises') rows = rows.filter(r => isYes(r.noises_heard));

  const hits = rows.filter(r => isYes(r.odor_detected) || isYes(r.leaks_observed) || isYes(r.noises_heard)).length;
  summary.innerHTML = '<b>' + rows.length + '</b> inspection' + (rows.length === 1 ? '' : 's')
                    + (hits ? ', <b>' + hits + '</b> with at least one Yes' : '');

  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="state-msg">No inspections in this window.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((r, i) => {
    const detailGrid = [
      ['Weather', r.weather_conditions],
      ['Location', r.location],
      ['Odor detail', r.odor_detail],
      ['Leaks detail', r.leaks_detail],
      ['Noises detail', r.noises_detail],
      ['Equipment func.', r.equipment_functioning],
      ['Equipment issue', r.equipment_issue],
      ['Maintenance required', r.maintenance_required],
      ['Maintenance detail', r.maintenance_detail],
      ['Additional observations', r.additional_observations],
      ['Observation detail', r.observation_detail],
      ['Entry ID', r.entry_id],
    ];
    const detail = detailGrid.map(([lbl, v]) => {
      const has = v != null && String(v).trim() !== '';
      return '<div class="lbl">' + esc(lbl) + '</div>'
           + '<div class="val' + (has ? '' : ' empty') + '">' + (has ? esc(v) : '—') + '</div>';
    }).join('');

    const srcCls = (r.source || '').toLowerCase() === 'form' ? 'src-pill src-form' : 'src-pill';
    const dm      = (dueByItem && dueByItem[normName(r.item)]) || null;
    const battery = dm && dm.battery ? dm.battery : '—';
    const dueTxt  = dm && dm.due     ? fmtDt(dm.due, null) : '—';
    return ''
      + '<tr class="row" data-i="' + i + '">'
      +   '<td>' + esc(fmtDt(r.inspection_date, r.inspection_datetime)) + '</td>'
      +   '<td>' + esc(r.inspected_by || '—') + '</td>'
      +   '<td class="col-item">' + esc(r.item || '—') + '</td>'
      +   '<td>' + esc(battery) + '</td>'
      +   '<td>' + esc(r.route_name || '—') + '</td>'
      +   '<td>' + yn(r.odor_detected) + '</td>'
      +   '<td>' + yn(r.leaks_observed) + '</td>'
      +   '<td>' + yn(r.noises_heard) + '</td>'
      +   '<td>' + esc(dueTxt) + '</td>'
      +   '<td><span class="' + srcCls + '">' + esc(r.source || '—') + '</span></td>'
      + '</tr>'
      + '<tr class="detail" id="d-' + i + '"><td colspan="10">'
      +   '<div class="detail-grid">' + detail + '</div>'
      + '</td></tr>';
  }).join('');

  tbody.querySelectorAll('tr.row').forEach(tr => {
    tr.addEventListener('click', () => {
      const d = document.getElementById('d-' + tr.dataset.i);
      d.classList.toggle('open');
    });
  });
}
</script>
