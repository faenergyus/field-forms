<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=3">
  <link rel="icon" type="image/x-icon" href="favicon.ico?v=3">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=3">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png?v=3">
  <title>My AVO Inspections</title>
  <!-- Canonical shared auth helper: exchanges the ~1h Google JWT for a 30-day
       fae1.* session token (POST /auth/session) and provides fetchAuthed with
       auto-401-retry + ensureUserRole (/wbd/whoami). Loaded BEFORE the app
       script. Replaces the old bespoke window.faeAuth shim. (Bug #415) -->
  <script src="https://admin.40ac.us/fae-auth.js?v=1"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f1; color: #1a1a1a; min-height: 100vh; }
    .page { max-width: 1320px; margin: 0 auto; padding: 18px 18px 60px; }

    .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .toolbar label { font-size: 0.78rem; font-weight: 600; color: #565c63; }
    .toolbar select { padding: 7px 10px; font-size: 0.85rem; border: 1.5px solid #d0d4d8; border-radius: 6px; background: #fff; }
    .toolbar .summary { margin-left: auto; font-size: 0.78rem; color: #6b7177; }
    .toolbar .summary b { color: #2b3036; }

    .grid-card { background: #fff; border-radius: 9px; border: 1px solid #d8dadd; border-top: 3px solid #5b626b; overflow: hidden; }

    /* Desktop table layout */
    table.batch { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    table.batch th { text-align: left; padding: 8px 8px; background: #f3f5f7; border-bottom: 1.5px solid #d8dadd; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.06em; color: #565c63; white-space: nowrap; vertical-align: top; }
    table.batch th.q-hdr { text-align: center; padding: 6px 8px; }
    table.batch th.q-hdr .q-label { display: block; margin-bottom: 4px; }
    table.batch td { padding: 8px; border-bottom: 1px solid #eef2ee; vertical-align: top; }
    table.batch td.col-q { text-align: center; }
    table.batch tr.unchecked td { background: #fafbfc; color: #9aa0a6; }
    table.batch tr.unchecked td.col-name, table.batch tr.unchecked td.col-due { color: #6b7177; }

    /* Slide-toggle Y/N — single pill, click anywhere to toggle.
       Track color = selection (red NO, green YES); label sits on the
       colored side; white knob sits on the opposite end. */
    .yn {
      position: relative;
      display: inline-block;
      width: 72px; height: 26px;
      border-radius: 13px;
      background: #c0392b;
      cursor: pointer;
      user-select: none;
      vertical-align: middle;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
      transition: background 0.18s ease;
    }
    .yn[data-v="Yes"] { background: #2e9b3a; }
    .yn::before {
      position: absolute;
      top: 0; bottom: 0;
      display: flex; align-items: center;
      font-size: 0.66rem; font-weight: 800; color: #fff;
      letter-spacing: 0.04em;
      pointer-events: none;
      transition: left 0.18s ease, right 0.18s ease;
      text-shadow: 0 1px 0 rgba(0,0,0,0.12);
    }
    .yn[data-v="No"]::before  { content: 'NO';  right: 12px; }
    .yn[data-v="Yes"]::before { content: 'YES'; left: 11px; }
    .yn::after {
      content: '';
      position: absolute;
      top: 2px;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffffff 35%, #d4d4d4 100%);
      border: 1px solid #b0b0b0;
      box-shadow: 0 2px 3px rgba(0,0,0,0.25);
      transition: left 0.18s ease;
    }
    .yn[data-v="No"]::after  { left: 2px; }
    .yn[data-v="Yes"]::after { left: calc(100% - 24px); }
    .yn.individually-set { outline: 2px solid #f0c84a; outline-offset: 1px; }

    .chk { width: 20px; height: 20px; accent-color: #4a5158; cursor: pointer; vertical-align: middle; }
    .col-chk { width: 36px; text-align: center; }

    .col-name { min-width: 160px; }
    .col-due  { min-width: 92px; white-space: nowrap; font-size: 0.78rem; }
    .col-pumper { min-width: 84px; font-size: 0.78rem; }
    .col-status { min-width: 76px; }
    .col-q { min-width: 130px; }

    .badge { display: inline-block; padding: 1px 7px; font-size: 0.68rem; border-radius: 9px; font-weight: 600; }
    .badge.due { background: #fff3cd; color: #856404; }
    .badge.overdue { background: #fdebec; color: #a23022; }
    .badge.approaching { background: #e2efff; color: #2b4a8a; }
    .badge.ok { background: #e8f3e8; color: #2e6b2e; }
    .badge.gap { background: #f4e3d0; color: #8a5418; }

    /* Site (facility) group header row — wells are grouped under their site */
    table.batch tr.site-row td { background: #eef1f4; border-top: 2px solid #cfd4d9; border-bottom: 1px solid #d8dadd; padding: 7px 8px; font-weight: 700; color: #2b3036; font-size: 0.84rem; }
    table.batch tr.site-row .site-meta { font-weight: 500; color: #6b7177; font-size: 0.74rem; }
    table.batch tr.site-row .site-meta b { color: #3a3f45; }
    table.batch td.col-name.is-well { padding-left: 18px; }

    /* Per-row detail input slides in UNDER the toggle when Yes is selected */
    .q-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .q-cell .yn { align-self: center; }  /* pill stays natural-width, detail-input below can fill */
    .detail-input { width: 100%; padding: 6px 8px; font-size: 0.8rem; border: 1.5px solid #d0d4d8; border-radius: 5px; background: #fff; }
    .detail-input:focus { outline: none; border-color: #5b626b; }
    .detail-input.hidden { display: none; }

    .submit-row { display: flex; gap: 12px; align-items: center; margin-top: 16px; flex-wrap: wrap; }
    .submit-btn { padding: 11px 22px; background: #4a5158; color: #fff; border: none; border-radius: 7px; font-size: 0.92rem; font-weight: 600; cursor: pointer; }
    .submit-btn:disabled { background: #9aa0a6; cursor: not-allowed; }
    .submit-btn:active { background: #1c5a1c; }
    .submit-info { font-size: 0.78rem; color: #6b7177; }

    /* Mobile: collapse to single-column cards (≤640px) */
    @media (max-width: 640px) {
      .page { padding: 10px 8px 60px; }
      .toolbar { gap: 6px; font-size: 0.78rem; }
      .toolbar label { font-size: 0.72rem; }
      .toolbar select { font-size: 0.78rem; padding: 5px 8px; }
      .toolbar .summary { margin-left: 0; width: 100%; order: 99; }
      table.batch, table.batch thead, table.batch tbody, table.batch tr, table.batch td, table.batch th { display: block; }
      /* Sticky bulk-apply bar at top of viewport on mobile (master toggles) */
      table.batch thead { position: sticky; top: var(--chrome-hdr-h, 54px); z-index: 5; background: #f3f5f7; border-bottom: 1px solid #d8dadd; }
      table.batch thead tr { display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 4px 6px; padding: 6px 8px; align-items: center; }
      table.batch thead th { border: 0; background: transparent; padding: 0; }
      table.batch thead th.col-chk { grid-column: 1; }
      table.batch thead th.col-name,
      table.batch thead th.col-due,
      table.batch thead th.col-pumper,
      table.batch thead th.col-status { display: none; }
      table.batch thead th.q-hdr { padding: 0; font-size: 0.58rem; }
      table.batch thead th.q-hdr .q-label { margin-bottom: 2px; font-size: 0.58rem; }
      table.batch thead th.q-hdr .yn { transform: scale(0.92); transform-origin: left center; }
      /* Body rows are cards on mobile */
      table.batch tbody tr { border: 1px solid #eef2ee; border-radius: 8px; margin: 6px 8px; padding: 8px 10px; background: #fff; }
      table.batch tbody tr.unchecked { opacity: 0.55; }
      table.batch tbody tr.unchecked td { background: transparent; }
      table.batch tbody tr.site-row { background: #eef1f4; padding: 6px 10px; margin-top: 12px; margin-bottom: 4px; font-size: 0.84rem; }
      table.batch td { border: 0; padding: 3px 0; }
      table.batch td.col-chk { display: inline-block; vertical-align: middle; padding-right: 6px; }
      table.batch td.col-name { display: inline-block; font-weight: 700; font-size: 0.88rem; }
      table.batch td.col-due, table.batch td.col-pumper, table.batch td.col-status { display: inline-block; font-size: 0.7rem; color: #6b7177; padding-right: 8px; }
      table.batch td.col-due::before { content: 'Due '; color: #9aa0a6; }
      table.batch td.col-pumper::before { content: '· '; color: #9aa0a6; }
      table.batch td.col-status::before { content: '· '; color: #9aa0a6; }
      table.batch td.col-q { display: grid; grid-template-columns: 60px 1fr; gap: 6px; align-items: center; padding: 4px 0; border-top: 1px solid #eef2ee; min-width: 0; text-align: left; }
      table.batch td.col-q::before { content: attr(data-q-label); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; color: #565c63; letter-spacing: 0.04em; }
      table.batch td.col-q .q-cell { align-items: flex-start; gap: 4px; }
      table.batch td.col-q .yn { align-self: flex-start; justify-content: flex-start; }
      table.batch td.col-q .detail-input { font-size: 0.78rem; padding: 5px 7px; }
      .submit-btn { width: 100%; }
    }

    .state-msg { color: #6b7177; font-size: 0.88rem; padding: 30px; text-align: center; }
    .state-msg.err { color: #c0392b; }
    .state-msg.warn { color: #856404; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #4a5158; border-top-color:transparent; border-radius:50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .success-overlay { position: fixed; inset: 0; background: rgba(245,244,241,0.97); display: none; align-items: center; justify-content: center; z-index: 9000; }
    .success-overlay.show { display: flex; }
    .success-card { background: #fff; border-top: 4px solid #4a5158; border-radius: 12px; padding: 28px 32px; text-align: center; min-width: 320px; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .success-card .check { font-size: 2.6rem; color: #2e6b2e; line-height: 1; margin-bottom: 8px; }
    .success-card .title { font-size: 1.1rem; font-weight: 700; color: #2b3036; margin-bottom: 6px; }
    .success-card .msg { font-size: 0.85rem; color: #565c63; margin-bottom: 16px; white-space: pre-line; }
    .success-card .btn { display: inline-block; padding: 9px 20px; margin: 4px; background: #4a5158; color: #fff; border-radius: 7px; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 600; text-decoration: none; }
    .success-card .btn.alt { background: #f0eee9; color: #3a3a3a; }

    /* Login overlay */
    #login-overlay { position: fixed; inset: 0; z-index: 9999; background: #0d260d; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
    #login-overlay .login-logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; color: #5b626b; }
    #login-overlay .login-logo span { color: #fff; font-weight: 300; }
    #login-overlay .login-tagline { color: #90bc90; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; margin-top: -16px; }
    #login-overlay .login-title { color: #c8dcc8; font-size: 1rem; margin-bottom: 8px; }
    #login-overlay .login-error { color: #ff8080; font-size: 0.85rem; display: none; text-align: center; max-width: 280px; }
  </style>
  <link rel="stylesheet" href="chrome.css">
  <script src="chrome.js" defer></script>
  <script>
    (function () {
      var SITE = location.host.split('.')[0];
      function readPos() { var m = document.cookie.match(/(?:^|; )fae40_pos=([^;]+)/); if (!m) return {}; try { return JSON.parse(decodeURIComponent(m[1])); } catch (e) { return {}; } }
      function writePos(o) { document.cookie = 'fae40_pos=' + encodeURIComponent(JSON.stringify(o)) + '; domain=.40ac.us; path=/; max-age=2592000; Secure; SameSite=Lax'; }
      var pos = readPos();
      pos[SITE] = location.pathname + location.search;
      writePos(pos);
      function patchLinks() {
        document.querySelectorAll('a[href]').forEach(function (a) {
          var m = a.href.match(/^https:\/\/(analyst|scada|forms)\.40ac\.us\/?(?:[?#]|$)/);
          if (m && m[1] !== SITE && pos[m[1]]) { a.href = 'https://' + m[1] + '.40ac.us' + pos[m[1]]; }
        });
      }
      if (document.readyState !== 'loading') patchLinks();
      else document.addEventListener('DOMContentLoaded', patchLinks);
    })();
  </script>
</head>

<script>
const SESSION_KEY = 'fae_user';
const SESSION_HRS = 720;
const ACCOUNTS_CSV = 'https://docs.google.com/spreadsheets/d/146yuHYjs3RF3wtCK3Qj9NXH94DrStwhieTGqPeLQRfA/gviz/tq?tqx=out:csv&sheet=Accounts';
const API_BASE = 'https://api.40ac.us';

// ── Tunables (Lea County NM, conservative 8a-4p window) ─────────────────────
const SUNLIGHT_START_HOUR = 8;   // 24h local clock
const SUNLIGHT_END_HOUR   = 16;
const DAYS_BEFORE_DUE     = 3;   // pick a day from required-3 .. required
const MIN_GAP_MINUTES     = 10;  // per-pumper-per-day spacing

// ── SSO mirror ──────────────────────────────────────────────────────────────
(function () {
  try {
    var m = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    if (m && !localStorage.getItem(SESSION_KEY))
      localStorage.setItem(SESSION_KEY, decodeURIComponent(m[1]));
  } catch (e) {}
  try {
    var _set = localStorage.setItem.bind(localStorage);
    var _rem = localStorage.removeItem.bind(localStorage);
    localStorage.setItem = function (k, v) {
      _set(k, v);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=' + encodeURIComponent(v) + ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax'; } catch (e) {} }
    };
    localStorage.removeItem = function (k) {
      _rem(k);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=;domain=.40ac.us;path=/;max-age=0;Secure;SameSite=Lax'; } catch (e) {} }
    };
  } catch (e) {}
})();

function parseAccountsCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.match(/("(?:[^"]|"")*"|[^,]*)/g).map(c => c.replace(/^"|"$/g,'').trim());
    return { email: cols[0], displayName: cols[1], pbiName: cols[2], role: cols[3] };
  });
}

async function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email   = payload.email.toLowerCase();
  const errorEl = document.getElementById('login-error');
  errorEl.style.cssText = 'display:block;color:#90bc90';
  errorEl.textContent   = 'Checking access…';
  try {
    const rows  = parseAccountsCSV(await fetch(ACCOUNTS_CSV).then(r => r.text()));
    const match = rows.find(r => r.email.toLowerCase() === email && r.email !== 'x');
    if (!match) {
      errorEl.style.color = '#ff8080';
      errorEl.textContent = `Access denied for ${email}. Contact Ryan Swift to request access.`;
      return;
    }
    const session = {
      email, displayName: match.displayName, pbiName: match.pbiName,
      role: match.role, picture: payload.picture,
      credential: response.credential,
      expires: Date.now() + SESSION_HRS * 3600000
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    showApp(session);
  } catch(e) {
    errorEl.style.color = '#ff8080';
    errorEl.textContent = 'Could not verify access. Check your connection and try again.';
  }
}

function showApp(session) {
  document.getElementById('login-overlay').style.display = 'none';
  initApp(session);
}

(function () {
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    if (saved) {
      const s = JSON.parse(saved);
      if (s.expires > Date.now()) { showApp(s); return; }
      localStorage.removeItem(SESSION_KEY);
    }
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
})();

// ── App state ───────────────────────────────────────────────────────────────
let currentSession = null;
// Role-based-auto inspector scope (Ryan #421): pumpers see only their own
// inspections; engineer/admin/tech/ops see all. Resolved in initApp from
// /wbd/whoami. Defaults to true (restrictive) until role is known.
let IS_PUMPER = true;
let DUE_ROWS = [];   // raw rows from /avo/due
// Per-row local state: { checked, odor: 'No'|'Yes', leaks, noises,
//                        odor_touched, leaks_touched, noises_touched,
//                        chk_touched, detail: {odor, leaks, noises} }
let STATE = {};
// Master header values
let MASTER = { odor: 'No', leaks: 'No', noises: 'No' };
const QUESTIONS = ['odor', 'leaks', 'noises'];

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(s) {
  if (!s) return '—';
  // Avoid the UTC-midnight gotcha: parse YYYY-MM-DD as a local date.
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(String(s));
  if (m) return `${+m[2]}/${+m[3]}/${m[1].slice(2)}`;
  try {
    const d = new Date(s);
    if (isNaN(d)) return s;
    return `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(2)}`;
  } catch (e) { return s; }
}

function roleIsPumper(role) {
  const r = (role || '').toLowerCase();
  // Engineer / Admin / Tech / Ops see ALL inspections (Ryan #421); everyone
  // else — pumper or unknown role — is scoped to their own rows only.
  return !['engineer', 'admin', 'tech', 'ops'].includes(r);
}

function meName(session) {
  return (session && (session.pbiName || session.displayName) || '').trim();
}

async function initApp(session) {
  currentSession = session;

  // Inspector scope is AUTOMATIC and role-based — there is no user-facing
  // control (Ryan #421). Resolve the viewer's role from /wbd/whoami via the
  // canonical fae-auth helper; fall back to the role on the signed-in session
  // (Accounts sheet) if whoami is unavailable. Pumpers -> own rows only;
  // engineer/admin/tech/ops -> all rows.
  let role = null;
  try {
    if (window.faeAuth && window.faeAuth.ensureUserRole) {
      role = await window.faeAuth.ensureUserRole();
    }
  } catch (e) { /* fall through to session role */ }
  if (!role) role = (session && session.role) || '';
  IS_PUMPER = roleIsPumper(role);

  document.getElementById('windowSelect').addEventListener('change', load);
  document.getElementById('statusSelect').addEventListener('change', load);
  document.getElementById('masterChk').addEventListener('change', onMasterChk);
  QUESTIONS.forEach(q => {
    const m = document.getElementById('master' + q[0].toUpperCase() + q.slice(1));
    // Click anywhere on the pill = toggle between No / Yes
    m.addEventListener('click', () => {
      const next = m.dataset.v === 'Yes' ? 'No' : 'Yes';
      onMasterYn(q, next);
    });
    // Keyboard accessibility (Space / Enter)
    m.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        const next = m.dataset.v === 'Yes' ? 'No' : 'Yes';
        onMasterYn(q, next);
      }
    });
  });
  document.getElementById('submitBtn').addEventListener('click', submitBatch);
  load();
}

async function load() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '<tr><td colspan="8" class="state-msg"><span class="spinner"></span>Loading due inspections…</td></tr>';

  const params = new URLSearchParams();
  const me = meName(currentSession);
  // Role-based scope: pumpers are restricted to their own inspections.
  if (IS_PUMPER && me) params.set('inspector', me);
  const within = document.getElementById('windowSelect').value;
  if (within) params.set('within_days', within);
  const st = document.getElementById('statusSelect').value;
  if (st) params.set('status', st);

  try {
    // Authed via fae-auth (30-day fae1.* session token + auto-401-retry).
    // Bug #415: was using the raw ~1h Google JWT, which silently 401'd.
    const r = await window.faeAuth.fetchAuthed(API_BASE, API_BASE + '/avo/due?' + params.toString());
    if (r.status === 404) {
      tbody.innerHTML = '<tr><td colspan="8" class="state-msg warn">'
        + 'GET /avo/due endpoint not yet wired — orchestrator task 373 enqueued. '
        + 'In the meantime, use <a href="avo.html" style="color:#4a5158;text-decoration:underline">single-location AVO form</a>.'
        + '</td></tr>';
      DUE_ROWS = []; STATE = {}; updateSubmitButton();
      return;
    }
    // Distinguish an auth/session failure from a genuine empty result so a 401
    // can't masquerade as "no inspections due" (the core symptom of #415).
    if (r.status === 401 || r.status === 403) {
      tbody.innerHTML = '<tr><td colspan="8" class="state-msg err">'
        + 'Could not load inspections (auth/session expired). Try reloading the page, '
        + 'or sign out and back in.</td></tr>';
      DUE_ROWS = []; STATE = {}; updateSubmitButton();
      return;
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DUE_ROWS = await r.json();
    // Client-side safety filter: pumpers see only their own rows even if the
    // endpoint ignores ?inspector=... or returns extras.
    if (IS_PUMPER && me) {
      const meUp = me.toUpperCase();
      DUE_ROWS = DUE_ROWS.filter(r => (r.pumper || '').toUpperCase() === meUp);
    }
  } catch (err) {
    tbody.innerHTML = '<tr><td colspan="8" class="state-msg err">'
      + 'Could not load inspections (' + esc(err.message || err) + '). Try reloading.</td></tr>';
    DUE_ROWS = []; STATE = {}; updateSubmitButton();
    return;
  }
  // initialize state
  STATE = {};
  DUE_ROWS.forEach((row, i) => {
    STATE[i] = {
      checked: true,
      odor:   MASTER.odor,
      leaks:  MASTER.leaks,
      noises: MASTER.noises,
      odor_touched:   false,
      leaks_touched:  false,
      noises_touched: false,
      chk_touched:    false,
      detail: { odor: '', leaks: '', noises: '' },
    };
  });
  document.getElementById('masterChk').checked = true;
  renderRows();
  updateSubmitButton();
}

// Stable per-facility grouping key (facility_id, or fac_name when id is null).
function facKey(r) { return r.facility_id != null ? 'F' + r.facility_id : 'N' + (r.fac_name || ''); }

// Build contiguous facility groups in DUE_ROWS order (the endpoint already
// orders wells by facility, soonest-due site first).
function buildGroups() {
  const groups = [];
  const byKey = {};
  DUE_ROWS.forEach((r, i) => {
    const k = facKey(r);
    if (!(k in byKey)) {
      byKey[k] = groups.length;
      groups.push({ key: k, fac_name: r.fac_name, company: r.company,
                    pumper: r.pumper, frequency: r.avo_frequency,
                    site_gas: r.site_gas_mcfd, idxs: [] });
    }
    groups[byKey[k]].idxs.push(i);
  });
  return groups;
}

function statusBadgeHtml(status) {
  const s = (status || '').toLowerCase();
  let cls = 'ok';
  if (s === 'overdue' || s === 'never avo') cls = 'overdue';
  else if (s === 'no inspection link') cls = 'gap';
  else if (s === 'ok') cls = 'ok';
  else if (s === 'approaching') cls = 'approaching';
  else cls = 'due';
  return '<span class="badge ' + cls + '">' + esc(status || '—') + '</span>';
}

function renderRows() {
  const tbody = document.getElementById('tbody');
  if (!DUE_ROWS.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="state-msg">No inspections currently due in this window.</td></tr>';
    return;
  }

  const groups = buildGroups();

  function wellRow(i) {
    const r = DUE_ROWS[i];
    const s = STATE[i];
    const cls = s.checked ? '' : 'unchecked';
    const overdueNote = (r.days_overdue && r.days_overdue > 0) ? ' (' + r.days_overdue + 'd)' : '';

    function qCell(q, label) {
      const v = s[q];
      const touched = s[q + '_touched'];
      const showDetail = v === 'Yes';
      return '<td class="col-q" data-q-label="' + label + '">'
           + '<div class="q-cell">'
           +   '<div class="yn' + (touched ? ' individually-set' : '') + '" '
           +        'data-row="' + i + '" data-q="' + q + '" data-v="' + v + '" '
           +        'role="switch" aria-checked="' + (v === 'Yes') + '" tabindex="0"></div>'
           +   '<input class="detail-input ' + (showDetail ? '' : 'hidden') + '" '
           +         'placeholder="Describe…" data-row="' + i + '" data-q="' + q + '" '
           +         'value="' + esc(s.detail[q]) + '">'
           + '</div>'
           + '</td>';
    }

    return '<tr class="' + cls + '" data-row="' + i + '">'
      + '<td class="col-chk"><input type="checkbox" class="chk row-chk" data-row="' + i + '"' + (s.checked ? ' checked' : '') + '></td>'
      + '<td class="col-name is-well">' + esc(r.well_name || r.fac_name || '—') + '</td>'
      + '<td class="col-due">' + esc(fmtDate(r.next_due_date)) + overdueNote + '</td>'
      + '<td class="col-pumper">' + esc(r.pumper || '—') + '</td>'
      + '<td class="col-status">' + statusBadgeHtml(r.status) + '</td>'
      + qCell('odor',   'Odor')
      + qCell('leaks',  'Leaks')
      + qCell('noises', 'Noises')
      + '</tr>';
  }

  function siteHeader(g) {
    const all  = g.idxs.every(i => STATE[i].checked);
    const n    = g.idxs.length;
    const gas  = (g.site_gas != null && !isNaN(g.site_gas))
               ? (Math.round(g.site_gas * 10) / 10) + ' Mcf/d' : '';
    return '<tr class="site-row" data-fac="' + esc(g.key) + '">'
      + '<td class="col-chk"><input type="checkbox" class="chk site-chk" data-fac="' + esc(g.key) + '"' + (all ? ' checked' : '') + ' title="Check / uncheck all wells at this site"></td>'
      + '<td colspan="7">' + esc(g.fac_name || '(unnamed site)')
      +   ' <span class="site-meta">· ' + n + ' well' + (n === 1 ? '' : 's')
      +     (g.company  ? ' · ' + esc(g.company) : '')
      +     (g.pumper   ? ' · ' + esc(g.pumper)  : '')
      +     (g.frequency ? ' · <b>' + esc(g.frequency) + '</b>' : '')
      +     (gas        ? ' · ' + esc(gas) : '')
      +   '</span></td>'
      + '</tr>';
  }

  tbody.innerHTML = groups.map(g =>
    siteHeader(g) + g.idxs.map(wellRow).join('')
  ).join('');

  // wire site (facility) checkboxes — toggle every well under the site
  tbody.querySelectorAll('.site-chk').forEach(el => {
    const g = groups.find(x => x.key === el.dataset.fac);
    if (g) {
      const all  = g.idxs.every(i => STATE[i].checked);
      const some = g.idxs.some(i => STATE[i].checked);
      el.indeterminate = some && !all;
    }
    el.addEventListener('change', () => {
      const g2 = groups.find(x => x.key === el.dataset.fac);
      if (!g2) return;
      g2.idxs.forEach(i => { STATE[i].checked = el.checked; STATE[i].chk_touched = true; });
      renderRows();
      updateSubmitButton();
    });
  });

  // wire row checkboxes
  tbody.querySelectorAll('.row-chk').forEach(el => {
    el.addEventListener('change', () => {
      const i = +el.dataset.row;
      STATE[i].checked = el.checked;
      STATE[i].chk_touched = true;
      renderRows();
      updateSubmitButton();
    });
  });
  // wire row Y/N slide toggles — click anywhere on the pill toggles state
  tbody.querySelectorAll('.yn[data-row]').forEach(pair => {
    const flip = () => {
      const i = +pair.dataset.row;
      const q = pair.dataset.q;
      STATE[i][q] = pair.dataset.v === 'Yes' ? 'No' : 'Yes';
      STATE[i][q + '_touched'] = true;
      renderRows();
      updateSubmitButton();
    };
    pair.addEventListener('click', flip);
    pair.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
    });
  });
  // wire detail inputs (input handler only — no re-render so focus is kept)
  tbody.querySelectorAll('.detail-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const i = +inp.dataset.row;
      const q = inp.dataset.q;
      STATE[i].detail[q] = inp.value;
    });
  });

  // summary
  const total = DUE_ROWS.length;
  const sites = groups.length;
  const checked = DUE_ROWS.filter((_, i) => STATE[i].checked).length;
  const overdue = DUE_ROWS.filter(r => (r.status || '').toLowerCase() === 'overdue').length;
  const nolink  = DUE_ROWS.filter(r => (r.status || '').toLowerCase() === 'no inspection link').length;
  document.getElementById('summary').innerHTML =
    '<b>' + total + '</b> well' + (total === 1 ? '' : 's') + ' at <b>' + sites + '</b> site' + (sites === 1 ? '' : 's')
    + ' · <b>' + checked + '</b> selected'
    + (overdue ? ' · <b>' + overdue + '</b> overdue' : '')
    + (nolink ? ' · <b>' + nolink + '</b> never AVO-ed' : '');
}

function onMasterChk(e) {
  const v = e.target.checked;
  DUE_ROWS.forEach((_, i) => {
    if (!STATE[i].chk_touched) STATE[i].checked = v;
  });
  renderRows();
  updateSubmitButton();
}

function onMasterYn(q, v) {
  MASTER[q] = v;
  // update master slide-toggle visual (data-v drives all CSS)
  const m = document.getElementById('master' + q[0].toUpperCase() + q.slice(1));
  m.dataset.v = v;
  m.setAttribute('aria-checked', v === 'Yes');
  // propagate to non-touched rows
  DUE_ROWS.forEach((_, i) => {
    if (!STATE[i][q + '_touched']) STATE[i][q] = v;
  });
  renderRows();
  updateSubmitButton();
}

function updateSubmitButton() {
  const checked = DUE_ROWS.filter((_, i) => STATE[i].checked).length;
  const btn = document.getElementById('submitBtn');
  const info = document.getElementById('submitInfo');
  btn.disabled = checked === 0;
  if (checked === 0) {
    info.textContent = 'No rows selected.';
  } else {
    info.textContent = checked + ' inspection' + (checked === 1 ? '' : 's')
      + ' will be submitted with auto-randomized 8a–4p datetimes within '
      + DAYS_BEFORE_DUE + ' days before each due date (≥' + MIN_GAP_MINUTES + ' min apart per pumper).';
  }
}

// ── Datetime generation: per-pumper-per-day, 8a–4p, ≥10 min apart ───────────
function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateDatetimes(checkedRows) {
  // Group by (pumper, date). For each row, pre-assign a random date in
  // [due-DAYS_BEFORE_DUE .. due]. Then within each (pumper, date) group,
  // pick minutes spaced >= MIN_GAP_MINUTES apart in [SUNLIGHT_START..END].
  const result = new Map();  // i -> 'YYYY-MM-DDTHH:MM'

  checkedRows.forEach(({ row, i }) => {
    const due = new Date(row.next_due_date + 'T00:00:00');
    const off = randInt(0, DAYS_BEFORE_DUE);  // 0..3 days BEFORE due
    const d = new Date(due);
    d.setDate(d.getDate() - off);
    result.set(i, { date: d, pumper: (row.pumper || '_').toUpperCase() });
  });

  // Group
  const groups = {};
  for (const [i, { date, pumper }] of result.entries()) {
    const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    const key = pumper + '|' + dateStr;
    (groups[key] = groups[key] || []).push({ i, dateStr });
  }

  // For each group, pick spaced minutes
  const startMin = SUNLIGHT_START_HOUR * 60;
  const endMin   = SUNLIGHT_END_HOUR   * 60;
  const range    = endMin - startMin;  // e.g. 480
  const minutesOut = new Map();

  for (const key of Object.keys(groups)) {
    const g = groups[key];
    const n = g.length;
    let mins;
    if (n === 1) {
      mins = [startMin + Math.floor(Math.random() * range)];
    } else {
      // Slot-based: divide range into n slots, pick within each slot leaving
      // MIN_GAP_MINUTES headroom against the next slot.
      const slot = Math.floor(range / n);
      if (slot < MIN_GAP_MINUTES) {
        // Too many rows; fall back to evenly-spaced + 1-min jitter
        mins = [];
        const step = Math.max(MIN_GAP_MINUTES, Math.floor(range / Math.max(1, n - 1)));
        for (let k = 0; k < n; k++) mins.push(Math.min(endMin, startMin + k * step));
      } else {
        mins = [];
        for (let k = 0; k < n; k++) {
          const slotStart = startMin + k * slot;
          const slotEnd   = startMin + (k + 1) * slot - MIN_GAP_MINUTES;
          mins.push(slotStart + Math.floor(Math.random() * Math.max(1, slotEnd - slotStart)));
        }
      }
    }
    // Shuffle assignment so order in the table != order in the day
    shuffle(g);
    g.forEach((item, k) => {
      const totalMin = mins[k];
      const hh = String(Math.floor(totalMin / 60)).padStart(2, '0');
      const mm = String(totalMin % 60).padStart(2, '0');
      minutesOut.set(item.i, item.dateStr + 'T' + hh + ':' + mm);
    });
  }

  return minutesOut;  // i -> 'YYYY-MM-DDTHH:MM'
}

async function submitBatch() {
  const btn = document.getElementById('submitBtn');
  const info = document.getElementById('submitInfo');
  const checkedRows = DUE_ROWS
    .map((row, i) => ({ row, i }))
    .filter(x => STATE[x.i].checked);
  if (!checkedRows.length) return;

  // Validate: any Yes cell must have a detail value
  const missing = checkedRows.filter(({ i }) => {
    const s = STATE[i];
    return QUESTIONS.some(q => s[q] === 'Yes' && !(s.detail[q] || '').trim());
  });
  if (missing.length) {
    info.textContent = `Add detail text for ${missing.length} Yes cell${missing.length === 1 ? '' : 's'} before submitting.`;
    return;
  }

  const datetimes = generateDatetimes(checkedRows);

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  let ok = 0, fail = 0;

  for (const { row, i } of checkedRows) {
    const s = STATE[i];
    const body = {
      inspection_datetime: datetimes.get(i),
      weather_conditions:  '',
      item:                row.well_name || row.fac_name,
      location:            row.well_name || row.fac_name,
      facility_id:         row.facility_id,
      well_api:            row.well_api,
      linked_item_type:    'Wells',
      odor_detected:       s.odor,
      odor_detail:         s.odor   === 'Yes' ? s.detail.odor   : '',
      leaks_observed:      s.leaks,
      leaks_detail:        s.leaks  === 'Yes' ? s.detail.leaks  : '',
      noises_heard:        s.noises,
      noises_detail:       s.noises === 'Yes' ? s.detail.noises : '',
    };
    try {
      const r = await window.faeAuth.fetchAuthed(API_BASE, API_BASE + '/avo/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (r.ok) ok++; else fail++;
    } catch (e) { fail++; }
    info.textContent = `Submitted ${ok + fail} / ${checkedRows.length}…`;
  }

  btn.disabled = false;
  btn.textContent = 'Submit checked inspections';
  if (fail) {
    info.innerHTML = `<span style="color:#c0392b">${ok} saved, ${fail} failed.</span>`;
  } else {
    info.textContent = `${ok} inspections saved.`;
    document.getElementById('successMsg').textContent =
      `${ok} AVO inspection${ok === 1 ? '' : 's'} saved with auto-randomized ` +
      `8a–4p datetimes (≥${MIN_GAP_MINUTES} min apart per pumper).`;
    document.getElementById('successOverlay').classList.add('show');
  }
}
