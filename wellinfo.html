<script>
// Auth
var ACCOUNTS_CSV = 'https://docs.google.com/spreadsheets/d/146yuHYjs3RF3wtCK3Qj9NXH94DrStwhieTGqPeLQRfA/gviz/tq?tqx=out:csv&sheet=Accounts';
var TRACKER_URL  = 'https://script.google.com/macros/s/AKfycbxOyZbt18JXuPTvkkJrZ3jJgM_xOMQ035CmQWJDolIuEqVKHFP1hNZfbmlcp6dY32Zprw/exec';
var SESSION_KEY  = 'fae_portal_user';
var SESSION_HRS  = 720;

function parseAccountsCSV(text) {
  var lines = text.trim().split('\n');
  return lines.slice(1).map(function(line) {
    var cols = line.match(/("(?:[^"]|"")*"|[^,]*)/g).map(function(c) { return c.replace(/^"|"$/g,'').trim(); });
    return { email: cols[0], displayName: cols[1] };
  });
}

async function handleCredentialResponse(response) {
  var payload = JSON.parse(atob(response.credential.split('.')[1]));
  var email = payload.email.toLowerCase();
  var picture = payload.picture;
  var errorEl = document.getElementById('login-error');
  errorEl.style.cssText = 'display:block;color:#90bc90';
  errorEl.textContent = 'Checking access...';
  try {
    var csv = await fetch(ACCOUNTS_CSV).then(function(r) { return r.text(); });
    var rows = parseAccountsCSV(csv);
    var match = rows.find(function(r) { return r.email.toLowerCase() === email && r.email !== 'x'; });
    if (!match) { errorEl.style.color = '#ff8080'; errorEl.textContent = 'Access denied for ' + email; return; }
    var session = { email: email, displayName: match.displayName, picture: picture, expires: Date.now() + SESSION_HRS * 3600000 };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    fetch(TRACKER_URL, { method:'POST', body: JSON.stringify({ email: email }) }).catch(function(){});
    showPortal(session);
  } catch(e) { errorEl.style.color = '#ff8080'; errorEl.textContent = 'Could not verify access.'; }
}

function showPortal(session) {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('user-badge').style.display = 'flex';
  document.getElementById('user-name').textContent = 'Welcome, ' + session.displayName;
  if (session.picture) document.getElementById('user-avatar').src = session.picture;
}

function signOut() { localStorage.removeItem(SESSION_KEY); location.reload(); }

(function() {
  var raw = localStorage.getItem(SESSION_KEY);
  if (!raw) return;
  try { var s = JSON.parse(raw); if (Date.now() < s.expires) showPortal(s); } catch(e) {}
})();

var WELL_NAMES = Object.keys(WELL_DATA).sort();

// Autocomplete
var input = document.getElementById('wellInput');
var list  = document.getElementById('acList');
var countEl = document.getElementById('wellCount');
var acIdx = -1;
countEl.textContent = WELL_NAMES.length + ' wells';

input.addEventListener('input', function() {
  var q = this.value.toUpperCase();
  if (!q) { list.style.display = 'none'; countEl.textContent = WELL_NAMES.length + ' wells'; return; }
  var matches = WELL_NAMES.filter(function(w) { return w.toUpperCase().indexOf(q) >= 0; }).slice(0, 30);
  if (!matches.length) { list.style.display = 'none'; countEl.textContent = 'No matches'; return; }
  list.innerHTML = matches.map(function(w) {
    var hi = w.replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
    return '<div class="ac-item" data-val="' + w.replace(/"/g,'&quot;') + '">' + hi + '</div>';
  }).join('');
  list.style.display = 'block';
  acIdx = -1;
  countEl.textContent = matches.length + ' match' + (matches.length !== 1 ? 'es' : '');
});

input.addEventListener('keydown', function(e) {
  var items = list.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx + 1, items.length - 1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx - 1, 0); }
  else if (e.key === 'Enter' && acIdx >= 0) { e.preventDefault(); selectWell(items[acIdx].dataset.val); return; }
  else return;
  items.forEach(function(el, i) { el.classList.toggle('active', i === acIdx); });
  if (items[acIdx]) items[acIdx].scrollIntoView({ block: 'nearest' });
});

list.addEventListener('click', function(e) {
  var item = e.target.closest('.ac-item');
  if (item) selectWell(item.dataset.val);
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.autocomplete-wrap')) list.style.display = 'none';
});

function selectWell(name) {
  input.value = name;
  list.style.display = 'none';
  countEl.textContent = 'Selected: ' + name;
  renderWellInfo(name);
}

// Render
function v(val) { return val || '\u2014'; }
function vc(val) { return val ? 'data-val' : 'data-val empty'; }
function esc(s) { return s ? s.replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function casingCard(title, arr, color) {
  if (!arr || arr.every(function(x) { return !x; })) return '';
  return '<div class="data-card" style="border-left-color:' + color + '"><h3>' + title + '</h3>' +
    '<div class="data-grid four">' +
    '<div><div class="data-label">Depth</div><div class="' + vc(arr[0]) + '">' + v(arr[0]) + '</div></div>' +
    '<div><div class="data-label">Size</div><div class="' + vc(arr[1]) + '">' + v(arr[1]) + '</div></div>' +
    '<div><div class="data-label">Weight</div><div class="' + vc(arr[2]) + '">' + v(arr[2]) + '</div></div>' +
    '<div><div class="data-label">Hole Size</div><div class="' + vc(arr[3]) + '">' + v(arr[3]) + '</div></div>' +
    '</div></div>';
}

function renderWellInfo(name) {
  var w = WELL_DATA[name];
  if (!w) return;
  document.getElementById('wellDisplay').style.display = 'block';
  document.getElementById('wellHeader').textContent = name;

  var html = '';
  html += '<div class="data-card"><h3>General</h3><div class="data-grid">' +
    '<div><div class="data-label">Spud Date</div><div class="' + vc(w.sd) + '">' + v(w.sd) + '</div></div>' +
    '<div><div class="data-label">WBD File Date</div><div class="' + vc(w.wd) + '">' + v(w.wd) + '</div></div>' +
    '<div><div class="data-label">Source</div><div class="' + vc(w.sf) + '">' + v(w.sf) + '</div></div>' +
    '<div><div class="data-label">WBD Source</div><div class="' + vc(w.ws) + '">' + v(w.ws) + '</div></div>' +
    '</div></div>';

  html += casingCard('Surface Casing', w.sc, '#4a9a4a');
  html += casingCard('Intermediate Casing', w.ic, '#7a6a3a');
  html += casingCard('Production Casing', w.pc, '#3a6a8a');
  html += casingCard('Liner', w.ln, '#8a5a3a');

  html += '<div class="data-card"><h3>Wellbore</h3><div class="data-grid">' +
    '<div><div class="data-label">TD</div><div class="' + vc(w.td) + '">' + v(w.td) + '</div></div>' +
    '<div><div class="data-label">PBTD</div><div class="' + vc(w.pb) + '">' + v(w.pb) + '</div></div>' +
    '</div>' +
    (w.pf ? '<div style="margin-top:8px"><div class="data-label">Perforations</div><div class="data-val multi">' + esc(w.pf) + '</div></div>' : '') +
    '</div>';

  if (w.rr || w.tt) {
    html += '<div class="data-card"><h3>Downhole Equipment</h3>';
    if (w.rr) html += '<div class="data-label">EOJ Rods</div><div class="data-val multi">' + esc(w.rr) + '</div>';
    if (w.tt) html += '<div style="margin-top:8px"><div class="data-label">EOJ Tubing</div><div class="data-val multi">' + esc(w.tt) + '</div></div>';
    html += '</div>';
  }

  if (w.nt) {
    html += '<div class="data-card"><h3>Notes</h3><div class="data-val multi">' + esc(w.nt) + '</div></div>';
  }

  document.getElementById('dataCards').innerHTML = html;
  drawWBD(w);
  document.getElementById('wellDisplay').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── WBD Renderer ──
function parseDepth(s) {
  if (s == null) return null;
  var n = parseFloat(String(s).replace(/[',\s]/g, ''));
  return isNaN(n) || n < 10 ? null : n;
}

function parseSize(s) {
  if (s == null) return null;
  s = String(s).replace(/"/g, '').replace(/#/g, '').trim();
  // Handle fractions: "4-1/2" or "4 1/2" or "9 5/8"
  var m = s.match(/^(\d+)\s*[-\s]\s*(\d+)\/(\d+)$/);
  if (m) return parseFloat(m[1]) + parseFloat(m[2]) / parseFloat(m[3]);
  m = s.match(/^(\d+)\/(\d+)$/);
  if (m) return parseFloat(m[1]) / parseFloat(m[2]);
  var n = parseFloat(s);
  return isNaN(n) ? null : n;
}

function parsePerfs(s) {
  if (!s) return [];
  var perfs = [];
  var lines = s.split(/[\n,;]+/);
  for (var i = 0; i < lines.length; i++) {
    var m = lines[i].match(/(\d[\d,]*)\s*[-–—to]+\s*(\d[\d,]*)/);
    if (m) perfs.push({ top: parseInt(m[1].replace(/,/g,'')), bot: parseInt(m[2].replace(/,/g,'')) });
  }
  return perfs;
}

function drawWBD(w) {
  var container = document.getElementById('wbdContainer');
  var names = ['Surface','Intermediate','Production','Liner'];
  var keys = ['sc','ic','pc','ln'];
  var colors = ['#2e7d32','#8d6e27','#1565c0','#6d4c41'];
  var fills  = ['#a5d6a7','#ffe082','#90caf9','#bcaaa4'];

  // Gather casing strings
  var strings = [];
  for (var i = 0; i < 4; i++) {
    var c = w[keys[i]];
    if (!c) continue;
    var depth = parseDepth(c[0]), size = parseSize(c[1]);
    if (depth || size) strings.push({ name: names[i], depth: depth, size: size, weight: c[2], holeSize: parseSize(c[3]), color: colors[i], fill: fills[i], raw: c });
  }
  var td = parseDepth(w.td), pbtd = parseDepth(w.pb), perfs = parsePerfs(w.pf);

  if (!strings.length && !td && !perfs.length) {
    container.innerHTML = '<div style="text-align:center;color:#999;font-size:0.85rem;padding:40px 0;">No wellbore data available</div>';
    return;
  }

  // Collect all key depths (features we want to show)
  var features = []; // {depth, label, type}
  features.push({depth: 0, type: 'surface'});
  for (var i = 0; i < strings.length; i++) if (strings[i].depth) features.push({depth: strings[i].depth, type: 'shoe', idx: i});
  for (var i = 0; i < perfs.length; i++) {
    features.push({depth: perfs[i].top, type: 'perf_top', idx: i});
    features.push({depth: perfs[i].bot, type: 'perf_bot', idx: i});
  }
  if (td) features.push({depth: td, type: 'td'});
  if (pbtd) features.push({depth: pbtd, type: 'pbtd'});
  features.sort(function(a,b) { return a.depth - b.depth; });

  // Build segments: zones around features get full space, gaps get compressed with zigzag breaks
  var ZONE_PAD = 80; // ft padding around each feature
  var segments = []; // {startD, endD, pixels, isBreak}
  var totalPixels = 0;
  var svgW = 340, svgH = 750;
  var topM = 50, botM = 30, leftM = 58, rightM = 20;
  var availH = svgH - topM - botM;
  var maxDepth = 0;
  for (var i = 0; i < features.length; i++) if (features[i].depth > maxDepth) maxDepth = features[i].depth;
  if (!maxDepth) maxDepth = 5000;
  maxDepth *= 1.03;

  // Merge nearby features into zones
  var zones = []; // {top, bot} depth ranges that need detail
  for (var i = 0; i < features.length; i++) {
    var d = features[i].depth;
    var zt = Math.max(0, d - ZONE_PAD);
    var zb = d + ZONE_PAD;
    if (zones.length && zt <= zones[zones.length-1].bot) {
      zones[zones.length-1].bot = Math.max(zones[zones.length-1].bot, zb);
    } else {
      zones.push({top: zt, bot: zb});
    }
  }

  // Build segment list: zone (proportional) | break (fixed 18px zigzag) | zone ...
  var BREAK_PX = 18;
  var breakCount = 0;
  for (var i = 0; i < zones.length; i++) {
    if (i > 0 && zones[i].top > zones[i-1].bot + 50) {
      segments.push({startD: zones[i-1].bot, endD: zones[i].top, px: BREAK_PX, isBreak: true});
      breakCount++;
    }
    segments.push({startD: zones[i].top, endD: Math.min(zones[i].bot, maxDepth), px: 0, isBreak: false});
  }

  // Distribute remaining pixels proportionally among non-break segments
  var totalDepthShown = 0;
  for (var i = 0; i < segments.length; i++) if (!segments[i].isBreak) totalDepthShown += (segments[i].endD - segments[i].startD);
  var availForZones = availH - breakCount * BREAK_PX;
  for (var i = 0; i < segments.length; i++) {
    if (!segments[i].isBreak) {
      segments[i].px = Math.max(20, ((segments[i].endD - segments[i].startD) / totalDepthShown) * availForZones);
    }
  }

  // Build cumulative Y positions
  var segY = [topM];
  for (var i = 0; i < segments.length; i++) segY.push(segY[i] + segments[i].px);

  // Depth-to-Y mapping using segments
  function dToY(d) {
    for (var i = 0; i < segments.length; i++) {
      if (d <= segments[i].endD) {
        if (segments[i].isBreak) return segY[i] + segments[i].px / 2;
        var frac = (d - segments[i].startD) / Math.max(1, segments[i].endD - segments[i].startD);
        return segY[i] + frac * segments[i].px;
      }
    }
    return segY[segY.length - 1];
  }

  // Size to half-width
  var centerX = leftM + (svgW - leftM - rightM) / 2;
  var maxHalfW = (svgW - leftM - rightM) / 2 - 30;
  var maxSz = 0;
  for (var i = 0; i < strings.length; i++) {
    var hs = strings[i].holeSize || (strings[i].size ? strings[i].size * 1.3 : 0);
    if (hs > maxSz) maxSz = hs;
  }
  if (maxSz < 10) maxSz = 14;
  function sToW(sz) { return sz ? Math.max(8, (sz / maxSz) * maxHalfW) : 15; }

  // Start SVG
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + svgW + ' ' + svgH + '">';
  svg += '<defs>';
  svg += '<pattern id="cement" width="6" height="6" patternUnits="userSpaceOnUse"><rect width="6" height="6" fill="#e0d8c8"/><circle cx="1" cy="1" r="0.7" fill="#c0b8a0"/><circle cx="4" cy="4" r="0.7" fill="#c0b8a0"/></pattern>';
  svg += '<pattern id="perfhatch" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="4" stroke="#c62828" stroke-width="1"/></pattern>';
  svg += '</defs>';
  svg += '<rect width="' + svgW + '" height="' + svgH + '" fill="#fafdf8" rx="8"/>';

  // Ground surface with gradient
  svg += '<rect x="' + leftM + '" y="' + (topM - 16) + '" width="' + (svgW - leftM - rightM) + '" height="16" fill="#8d6e63" opacity="0.3" rx="0"/>';
  for (var gx = leftM; gx < svgW - rightM; gx += 7) {
    svg += '<line x1="' + gx + '" y1="' + topM + '" x2="' + (gx - 4) + '" y2="' + (topM - 7) + '" stroke="#5d4037" stroke-width="0.7" opacity="0.5"/>';
  }
  svg += '<line x1="' + leftM + '" y1="' + topM + '" x2="' + (svgW - rightM) + '" y2="' + topM + '" stroke="#5d4037" stroke-width="2"/>';
  svg += '<text x="' + (leftM - 5) + '" y="' + (topM + 4) + '" text-anchor="end" font-size="9" fill="#5d4037" font-weight="700" font-family="monospace">GL</text>';

  // Draw zigzag breaks
  for (var i = 0; i < segments.length; i++) {
    if (!segments[i].isBreak) continue;
    var by = segY[i];
    var bh = segments[i].px;
    var bmid = by + bh / 2;
    // White mask
    svg += '<rect x="' + (leftM - 10) + '" y="' + by + '" width="' + (svgW - leftM + 10 - rightM + 10) + '" height="' + bh + '" fill="#fafdf8"/>';
    // Zigzag lines top and bottom
    var zigW = svgW - leftM - rightM + 20;
    var zigX = leftM - 10;
    for (var z = 0; z < 2; z++) {
      var zy = z === 0 ? by + 2 : by + bh - 2;
      var path = 'M' + zigX + ',' + zy;
      for (var zx = zigX; zx < zigX + zigW; zx += 8) {
        path += ' l4,-4 l4,4';
      }
      svg += '<path d="' + path + '" fill="none" stroke="#999" stroke-width="1"/>';
    }
    // Depth labels for the break
    svg += '<text x="' + (leftM - 5) + '" y="' + (by + 4) + '" text-anchor="end" font-size="7" fill="#999" font-family="monospace">' + Math.round(segments[i].startD) + "'</text>";
    svg += '<text x="' + (leftM - 5) + '" y="' + (by + bh) + '" text-anchor="end" font-size="7" fill="#999" font-family="monospace">' + Math.round(segments[i].endD) + "'</text>";
  }

  // Draw casing strings (largest first)
  var sorted = strings.slice().sort(function(a,b) { return (b.size||0) - (a.size||0); });

  for (var i = 0; i < sorted.length; i++) {
    var cs = sorted[i];
    if (!cs.depth) continue;
    var y1 = topM;
    var y2 = dToY(cs.depth);
    var hw = sToW(cs.size || 5);
    var hhw = cs.holeSize ? sToW(cs.holeSize) : hw + 6;

    // Cement annulus (between hole wall and casing, bottom portion)
    var cementTop = y1 + (y2 - y1) * 0.4;
    svg += '<rect x="' + (centerX - hhw) + '" y="' + cementTop + '" width="' + ((hhw - hw)) + '" height="' + (y2 - cementTop) + '" fill="url(#cement)"/>';
    svg += '<rect x="' + (centerX + hw) + '" y="' + cementTop + '" width="' + ((hhw - hw)) + '" height="' + (y2 - cementTop) + '" fill="url(#cement)"/>';

    // Casing body (slightly transparent fill with solid walls)
    svg += '<rect x="' + (centerX - hw) + '" y="' + y1 + '" width="' + (hw * 2) + '" height="' + (y2 - y1) + '" fill="' + cs.fill + '" opacity="0.35"/>';

    // Casing walls — thick left and right lines
    svg += '<line x1="' + (centerX - hw) + '" y1="' + y1 + '" x2="' + (centerX - hw) + '" y2="' + y2 + '" stroke="' + cs.color + '" stroke-width="2.5"/>';
    svg += '<line x1="' + (centerX + hw) + '" y1="' + y1 + '" x2="' + (centerX + hw) + '" y2="' + y2 + '" stroke="' + cs.color + '" stroke-width="2.5"/>';

    // Float shoe (guide shoe symbol)
    svg += '<path d="M' + (centerX - hw - 5) + ',' + y2 + ' L' + (centerX - hw) + ',' + (y2 - 6) + '" stroke="' + cs.color + '" stroke-width="2.5" fill="none"/>';
    svg += '<path d="M' + (centerX + hw + 5) + ',' + y2 + ' L' + (centerX + hw) + ',' + (y2 - 6) + '" stroke="' + cs.color + '" stroke-width="2.5" fill="none"/>';
    svg += '<line x1="' + (centerX - hw - 5) + '" y1="' + y2 + '" x2="' + (centerX + hw + 5) + '" y2="' + y2 + '" stroke="' + cs.color + '" stroke-width="2"/>';

    // Label with connecting line
    var ly = y2 - 4;
    var lx = centerX + hhw + 8;
    var label = '';
    if (cs.raw[1]) label += cs.raw[1];
    if (cs.raw[2]) label += ' ' + cs.raw[2];
    var depthLabel = cs.depth ? cs.depth + "'" : cs.raw[0];
    svg += '<line x1="' + (centerX + hw + 2) + '" y1="' + ly + '" x2="' + (lx - 2) + '" y2="' + ly + '" stroke="' + cs.color + '" stroke-width="0.5" stroke-dasharray="2,2"/>';
    svg += '<text x="' + lx + '" y="' + (ly - 1) + '" font-size="8" fill="' + cs.color + '" font-weight="700" font-family="sans-serif">' + esc(cs.name) + '</text>';
    svg += '<text x="' + lx + '" y="' + (ly + 9) + '" font-size="7.5" fill="#555" font-family="sans-serif">' + esc(label) + ' @ ' + depthLabel + '</text>';
  }

  // Perforations
  for (var i = 0; i < perfs.length; i++) {
    var p = perfs[i];
    var py1 = dToY(p.top), py2 = dToY(p.bot);
    if (py2 - py1 < 3) py2 = py1 + 3;
    // Find innermost casing at perf depth
    var perfHw = 12;
    for (var j = sorted.length - 1; j >= 0; j--) {
      if (sorted[j].depth && sorted[j].depth >= p.top && sorted[j].size) { perfHw = sToW(sorted[j].size); break; }
    }
    // Hatched perf zone on casing walls
    svg += '<rect x="' + (centerX - perfHw - 8) + '" y="' + py1 + '" width="8" height="' + (py2 - py1) + '" fill="url(#perfhatch)" opacity="0.8"/>';
    svg += '<rect x="' + (centerX + perfHw) + '" y="' + py1 + '" width="8" height="' + (py2 - py1) + '" fill="url(#perfhatch)" opacity="0.8"/>';
    // Perf burst marks
    for (var py = py1 + 2; py <= py2 - 1; py += 5) {
      svg += '<line x1="' + (centerX - perfHw - 8) + '" y1="' + py + '" x2="' + (centerX - perfHw - 13) + '" y2="' + (py - 2) + '" stroke="#c62828" stroke-width="1.2"/>';
      svg += '<line x1="' + (centerX - perfHw - 8) + '" y1="' + py + '" x2="' + (centerX - perfHw - 13) + '" y2="' + (py + 2) + '" stroke="#c62828" stroke-width="1.2"/>';
      svg += '<line x1="' + (centerX + perfHw + 8) + '" y1="' + py + '" x2="' + (centerX + perfHw + 13) + '" y2="' + (py - 2) + '" stroke="#c62828" stroke-width="1.2"/>';
      svg += '<line x1="' + (centerX + perfHw + 8) + '" y1="' + py + '" x2="' + (centerX + perfHw + 13) + '" y2="' + (py + 2) + '" stroke="#c62828" stroke-width="1.2"/>';
    }
    // Label
    svg += '<text x="' + (centerX - perfHw - 16) + '" y="' + ((py1 + py2) / 2 + 3) + '" text-anchor="end" font-size="7" fill="#c62828" font-weight="700" font-family="monospace">' + p.top + '-' + p.bot + "'</text>";
  }

  // Tubing string
  var tubingDepth = null;
  if (w.tt) {
    var allDepths = w.tt.match(/to\s*([\d,]+)/gi);
    if (allDepths) {
      for (var i = 0; i < allDepths.length; i++) {
        var d = parseInt(allDepths[i].replace(/to\s*/i,'').replace(/,/g,''));
        if (d > (tubingDepth || 0)) tubingDepth = d;
      }
    }
    if (!tubingDepth) { var tm = w.tt.match(/([\d,]+)'/); if (tm) tubingDepth = parseInt(tm[1].replace(/,/g,'')); }
  }
  if (tubingDepth && tubingDepth > 100) {
    var tby = dToY(tubingDepth);
    svg += '<rect x="' + (centerX - 4) + '" y="' + topM + '" width="8" height="' + (tby - topM) + '" fill="#78909c" opacity="0.3" rx="1"/>';
    svg += '<line x1="' + (centerX - 4) + '" y1="' + topM + '" x2="' + (centerX - 4) + '" y2="' + tby + '" stroke="#546e7a" stroke-width="1.5"/>';
    svg += '<line x1="' + (centerX + 4) + '" y1="' + topM + '" x2="' + (centerX + 4) + '" y2="' + tby + '" stroke="#546e7a" stroke-width="1.5"/>';
    svg += '<text x="' + centerX + '" y="' + (tby + 11) + '" text-anchor="middle" font-size="7.5" fill="#546e7a" font-weight="600">Tbg ' + tubingDepth + "'</text>";
  }

  // TD marker
  if (td) {
    var tdy = dToY(td);
    svg += '<line x1="' + (leftM + 5) + '" y1="' + tdy + '" x2="' + (svgW - rightM - 5) + '" y2="' + tdy + '" stroke="#212121" stroke-width="2"/>';
    svg += '<rect x="' + (svgW - rightM - 62) + '" y="' + (tdy - 10) + '" width="58" height="13" fill="#212121" rx="2"/>';
    svg += '<text x="' + (svgW - rightM - 33) + '" y="' + (tdy - 1) + '" text-anchor="middle" font-size="8" fill="#fff" font-weight="700" font-family="monospace">TD ' + td + "'</text>";
  }

  // PBTD marker
  if (pbtd && pbtd !== td) {
    var pby = dToY(pbtd);
    svg += '<line x1="' + (leftM + 5) + '" y1="' + pby + '" x2="' + (svgW - rightM - 5) + '" y2="' + pby + '" stroke="#555" stroke-width="1.5" stroke-dasharray="5,3"/>';
    svg += '<text x="' + (svgW - rightM - 6) + '" y="' + (pby - 3) + '" text-anchor="end" font-size="7.5" fill="#555" font-weight="700" font-family="monospace">PBTD ' + pbtd + "'</text>";
  }

  // Depth scale for non-break segments
  for (var si = 0; si < segments.length; si++) {
    if (segments[si].isBreak) continue;
    var sd = segments[si].endD - segments[si].startD;
    var interval = sd <= 200 ? 50 : sd <= 500 ? 100 : sd <= 2000 ? 500 : 1000;
    var startTick = Math.ceil(segments[si].startD / interval) * interval;
    for (var d = startTick; d <= segments[si].endD; d += interval) {
      if (d === 0) continue;
      var ty = dToY(d);
      svg += '<line x1="' + (leftM - 3) + '" y1="' + ty + '" x2="' + (leftM + 2) + '" y2="' + ty + '" stroke="#bbb" stroke-width="0.5"/>';
      svg += '<text x="' + (leftM - 5) + '" y="' + (ty + 3) + '" text-anchor="end" font-size="7" fill="#999" font-family="monospace">' + d + "'</text>";
    }
  }

  svg += '</svg>';
  container.innerHTML = svg;
}
</script>
</body>
</html>
