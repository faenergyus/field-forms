<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Well Info — FAE Field Operations</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f1; color: #1a1a1a; min-height: 100vh;
    }
    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 9999; background: #0d260d;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
    }
    #login-overlay .login-logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; color: #5dc85d; }
    #login-overlay .login-logo span { color: #fff; font-weight: 300; }
    #login-overlay .login-tagline { color: #90bc90; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; margin-top: -16px; }
    #login-overlay .login-tagline em { color: #5dc85d; font-style: normal; }
    #login-overlay .login-title { color: #c8dcc8; font-size: 1rem; margin-bottom: 8px; }
    #login-overlay .login-error { color: #ff8080; font-size: 0.85rem; display: none; text-align: center; max-width: 280px; }
    /* ── Layout ── */
    .page { max-width: 720px; margin: 0 auto; padding: 18px 18px 60px; }
    .page-subtitle { font-size: 0.75rem; color: #6a8a6a; margin-bottom: 22px; letter-spacing: 0.04em; }
    /* ── Well picker ── */
    .picker { position: relative; margin-bottom: 20px; }
    .picker input {
      width: 100%; padding: 11px 14px; font-size: 0.95rem;
      border: 1.5px solid #c0c0c0; border-radius: 8px; background: #fff;
    }
    .picker input:focus { outline: none; border-color: #2d7a2d; }
    .ac-list {
      position: absolute; top: 100%; left: 0; right: 0; background: #fff;
      border: 1.5px solid #2d7a2d; border-top: none; border-radius: 0 0 8px 8px;
      max-height: 260px; overflow-y: auto; z-index: 50; display: none;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    }
    .ac-item { padding: 9px 14px; cursor: pointer; font-size: 0.88rem; }
    .ac-item:hover, .ac-item.active { background: #eaf5ea; color: #1c4a1c; }
    .ac-item mark { background: none; color: #2d7a2d; font-weight: 700; }
    .well-count { font-size: 0.72rem; color: #8aaa8a; margin-top: 4px; }
    /* ── Result table ── */
    .well-card {
      background: #fff; border-radius: 9px; padding: 18px 20px;
      border: 1px solid #d0e0d0; border-top: 3px solid #3a8a3a;
      box-shadow: none; display: none;
    }
    .well-card h2 {
      font-size: 1.05rem; color: #1c4a1c; margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 2px solid #3a8a3a;
    }
    .info-table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    .info-table td { padding: 11px 8px; border-bottom: 1px solid #eef2ee; }
    .info-table tr:last-child td { border-bottom: none; }
    .info-table .lbl {
      color: #5a7a5a; font-weight: 600; font-size: 0.78rem;
      text-transform: uppercase; letter-spacing: 0.05em; width: 56%;
    }
    .info-table .val { color: #1a2a1a; font-weight: 700; text-align: right; font-size: 1rem; }
    .info-table .val.none { color: #b0b0b0; font-weight: 400; }
    .state-msg { color: #6a8a6a; font-size: 0.85rem; padding: 30px 0; text-align: center; }
    .state-msg.err { color: #c0392b; }
    .spinner {
      display: inline-block; width: 15px; height: 15px; border: 2px solid #2d7a2d;
      border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; color: #8aaa8a; font-size: 0.72rem; margin-top: 36px; padding-top: 16px; border-top: 1px solid #d0e0d0; }
  </style>
  <link rel="stylesheet" href="chrome.css">
  <script src="chrome.js" defer></script>
  <script>
(function () {
  var SITE = location.host.split('.')[0]; // "analyst" | "scada" | "forms"
  function readPos() {
    var m = document.cookie.match(/(?:^|; )fae40_pos=([^;]+)/);
    if (!m) return {};
    try { return JSON.parse(decodeURIComponent(m[1])); } catch (e) { return {}; }
  }
  function writePos(o) {
    document.cookie = 'fae40_pos=' + encodeURIComponent(JSON.stringify(o)) +
      '; domain=.40ac.us; path=/; max-age=2592000; Secure; SameSite=Lax';
  }
  var pos = readPos();
  // 1. record our own current location
  pos[SITE] = location.pathname + location.search;
  writePos(pos);
  // 2. patch cross-app links on the page
  function patchLinks() {
    document.querySelectorAll('a[href]').forEach(function (a) {
      var m = a.href.match(/^https:\/\/(analyst|scada|forms)\.40ac\.us\/?(?:[?#]|$)/);
      if (m && m[1] !== SITE && pos[m[1]]) {
        a.href = 'https://' + m[1] + '.40ac.us' + pos[m[1]];
      }
    });
  }
  if (document.readyState !== 'loading') patchLinks();
  else document.addEventListener('DOMContentLoaded', patchLinks);
})();
</script>
</head>
<body>

<script>
// ── Auth (shared fae_user unified sign-in) ──────────────────────────────────
const ACCOUNTS_CSV = 'https://docs.google.com/spreadsheets/d/146yuHYjs3RF3wtCK3Qj9NXH94DrStwhieTGqPeLQRfA/gviz/tq?tqx=out:csv&sheet=Accounts';
const TRACKER_URL  = 'https://script.google.com/macros/s/AKfycbxOyZbt18JXuPTvkkJrZ3jJgM_xOMQ035CmQWJDolIuEqVKHFP1hNZfbmlcp6dY32Zprw/exec';
const SESSION_KEY  = 'fae_user';
const SESSION_HRS  = 720;
// ── Cross-subdomain SSO (self-healing .40ac.us cookie bridge) ──────────
// One Google sign-in covers analyst / scada / forms.40ac.us. On load:
// cookie→localStorage seed; if local session valid but cookie missing,
// re-write the cookie (self-heal); intercept setItem/removeItem to keep
// the cookie in sync with the localStorage session.
(function () {
  try {
    var m = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    if (m && !localStorage.getItem(SESSION_KEY))
      localStorage.setItem(SESSION_KEY, decodeURIComponent(m[1]));
  } catch (e) {}
  // Stale -> replace: if the .40ac.us cookie carries a fresh fae1.* token but
  // localStorage still holds a stale credential (e.g. an expired Google JWT),
  // replace LS so the session-resume / /auth/session call sees the fresh token.
  try {
    var _scm = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    var cookieTok = _scm ? decodeURIComponent(_scm[1]) : null;
    var lsRaw = localStorage.getItem(SESSION_KEY);
    var lsObj = null; try { lsObj = JSON.parse(lsRaw || 'null'); } catch (e) {}
    var lsCred = lsObj && lsObj.credential;
    if (cookieTok && cookieTok.indexOf('fae1.') === 0
        && (!lsCred || lsCred.indexOf('fae1.') !== 0)) {
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        credential: cookieTok,
        source: 'sso-self-heal'
      }));
    }
  } catch (e) {}
  try {
    var hasCookie = /(?:^|;\s*)fae40_sso=/.test(document.cookie);
    var raw = localStorage.getItem(SESSION_KEY);
    if (!hasCookie && raw) {
      var s = null; try { s = JSON.parse(raw); } catch (e) {}
      if (s && s.credential && s.expires && s.expires > Date.now()) {
        document.cookie = 'fae40_sso=' + encodeURIComponent(raw) +
          ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax';
      }
    }
  } catch (e) {}
  try {
    var _set = localStorage.setItem.bind(localStorage);
    var _rem = localStorage.removeItem.bind(localStorage);
    localStorage.setItem = function (k, v) {
      _set(k, v);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=' +
        encodeURIComponent(v) + ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax'; } catch (e) {} }
    };
    localStorage.removeItem = function (k) {
      _rem(k);
      if (k === SESSION_KEY) { try { document.cookie =
        'fae40_sso=;domain=.40ac.us;path=/;max-age=0;Secure;SameSite=Lax'; } catch (e) {} }
    };
  } catch (e) {}
})();
(function migrateLegacySession() {
  try {
    if (localStorage.getItem(SESSION_KEY)) return;
    for (const k of ['fae_portal_user', 'fae_scada_user']) {
      const v = localStorage.getItem(k);
      if (v) { localStorage.setItem(SESSION_KEY, v); localStorage.removeItem(k); return; }
    }
  } catch(e) {}
})();

function parseAccountsCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.match(/("(?:[^"]|"")*"|[^,]*)/g).map(c => c.replace(/^"|"$/g,'').trim());
    return { email: cols[0], displayName: cols[1], pbiName: cols[2], role: cols[3] };
  });
}

async function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email   = payload.email.toLowerCase();
  const errorEl = document.getElementById('login-error');
  errorEl.style.cssText = 'display:block;color:#90bc90';
  errorEl.textContent   = 'Checking access…';
  try {
    const rows  = parseAccountsCSV(await fetch(ACCOUNTS_CSV).then(r => r.text()));
    const match = rows.find(r => r.email.toLowerCase() === email && r.email !== 'x');
    if (!match) {
      errorEl.style.color = '#ff8080';
      errorEl.textContent = `Access denied for ${email}. Contact Ryan Swift to request access.`;
      return;
    }
    const session = { email, displayName: match.displayName, pbiName: match.pbiName,
                      role: match.role, picture: payload.picture,
                      expires: Date.now() + SESSION_HRS * 3600000 };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    fetch(TRACKER_URL, { method:'POST', body: JSON.stringify({ email }) }).catch(() => {});
    showApp(session);
  } catch(e) {
    errorEl.style.color = '#ff8080';
    errorEl.textContent = 'Could not verify access. Check your connection and try again.';
  }
}

function showApp(session) {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('user-badge').style.display    = 'flex';
  document.getElementById('user-name').textContent       = 'Welcome, ' + session.displayName;
  const av = document.getElementById('user-avatar');
  av.src = session.picture || ''; av.style.display = session.picture ? '' : 'none';
  initApp();
}
function signOut() { localStorage.removeItem(SESSION_KEY); location.reload(); }

// ── API base (matches scada.40ac.us / analyst.40ac.us — hardcoded permanent tunnel) ──
var API_BASE = 'https://api.40ac.us';
async function loadApiBase() { /* no-op — kept for call-site compatibility */ }

// ── Well list + picker ──────────────────────────────────────────────────────
var WELL_NAMES = [];
var acIdx = -1;

async function loadWellList() {
  if (!API_BASE) return;
  try {
    var res = await fetch(API_BASE + '/wbd/wells');
    var data = await res.json();
    var wells = Array.isArray(data) ? data : (data.wells || []);
    WELL_NAMES = wells.map(function(w){ return w.sn; }).filter(Boolean).sort();
  } catch (e) { console.error('well list failed:', e); }
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function initApp() {
  await loadApiBase();
  await loadWellList();
  var input = document.getElementById('wellInput');
  input.disabled = false;
  document.getElementById('wellCount').textContent = WELL_NAMES.length + ' wells';
  wireAutocomplete();
  // Deep link: ?sn= / ?well=
  try {
    var qs = new URLSearchParams(window.location.search);
    var sn = qs.get('sn') || qs.get('well') || qs.get('short');
    if (sn) {
      var match = WELL_NAMES.find(function(n){ return n.toUpperCase() === sn.toUpperCase(); });
      if (match) { input.value = match; selectWell(match); }
    }
  } catch (e) {}
}

function wireAutocomplete() {
  var input = document.getElementById('wellInput');
  var list  = document.getElementById('acList');
  var countEl = document.getElementById('wellCount');

  input.addEventListener('input', function() {
    var q = this.value.toUpperCase();
    if (!q) { list.style.display = 'none'; countEl.textContent = WELL_NAMES.length + ' wells'; return; }
    var matches = WELL_NAMES.filter(function(w){ return w.toUpperCase().indexOf(q) >= 0; }).slice(0, 40);
    if (!matches.length) { list.style.display = 'none'; countEl.textContent = 'No matches'; return; }
    list.innerHTML = matches.map(function(w) {
      var hi = esc(w).replace(new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')','gi'), '<mark>$1</mark>');
      return '<div class="ac-item" data-val="' + esc(w) + '">' + hi + '</div>';
    }).join('');
    list.style.display = 'block';
    acIdx = -1;
    countEl.textContent = matches.length + ' match' + (matches.length !== 1 ? 'es' : '');
  });

  input.addEventListener('keydown', function(e) {
    var items = list.querySelectorAll('.ac-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); acIdx = Math.min(acIdx + 1, items.length - 1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); acIdx = Math.max(acIdx - 1, 0); }
    else if (e.key === 'Enter') { e.preventDefault(); if (acIdx >= 0) items[acIdx].click(); return; }
    else return;
    items.forEach(function(it, i){ it.classList.toggle('active', i === acIdx); });
    items[acIdx].scrollIntoView({ block: 'nearest' });
  });

  list.addEventListener('click', function(e) {
    var item = e.target.closest('.ac-item');
    if (!item) return;
    var val = item.dataset.val;
    input.value = val;
    list.style.display = 'none';
    selectWell(val);
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.picker')) list.style.display = 'none';
  });
}

// ── Load + render the 4-field table ─────────────────────────────────────────
function num(x) {
  if (x == null) return NaN;
  return parseFloat(String(x).replace(/[, ']/g, ''));
}

async function selectWell(name) {
  var card  = document.getElementById('wellCard');
  var title = document.getElementById('wellCardTitle');
  var body  = document.getElementById('wellCardBody');
  card.style.display = 'block';
  title.textContent  = name;
  body.innerHTML = '<div class="state-msg"><span class="spinner"></span>Loading…</div>';

  try {
    if (!API_BASE) { await loadApiBase(); }
    var res = await fetch(API_BASE + '/wbd/' + encodeURIComponent(name));
    if (!res.ok) {
      body.innerHTML = '<div class="state-msg err">Could not load well (HTTP ' + res.status + ').</div>';
      return;
    }
    var well = await res.json();
    title.textContent = well.fn || name;
    renderTable(body, well);
  } catch (e) {
    body.innerHTML = '<div class="state-msg err">Error loading well: ' + esc(e.message || e) + '</div>';
  }
}

function renderTable(body, well) {
  // Pick the version carrying the most completion detail
  var vers = (well.v || []).slice().sort(function(a, b) {
    var sa = (a.csg||[]).length + (a.pf||[]).length + (a.tb||[]).length;
    var sb = (b.csg||[]).length + (b.pf||[]).length + (b.tb||[]).length;
    return sb - sa;
  });
  var v = vers[0] || {};

  // 1. Production casing size
  var prodSize = null;
  (v.csg || []).forEach(function(c) {
    if (c.ty && /production/i.test(c.ty) && c.sz) prodSize = c.sz;
  });

  // 2. Tubing size — distinct pipe sizes named in the tubing string
  var tbSizes = [];
  (v.tb || []).forEach(function(t) {
    var m = (t.desc || '').match(/^\s*(\d+(?:\s*\d+\/\d+)?\s*")/);
    if (m) { var s = m[1].replace(/\s+/g,' ').trim(); if (tbSizes.indexOf(s) < 0) tbSizes.push(s); }
  });

  // 3. Top perf — shallowest perforation top depth
  var perfTops = (v.pf || []).map(function(p){ return num(p.td); })
                              .filter(function(n){ return !isNaN(n) && n > 0; });
  var topPerf = perfTops.length ? Math.min.apply(null, perfTops) : null;

  // 4. Top of pump / packer — deepest tubing-string component with a depth.
  //    Label depends on whether a packer is present (otherwise it's a pump).
  var isPacker = (v.tb || []).some(function(t){ return /packer/i.test(t.desc || ''); });
  var tbDepths = (v.tb || []).map(function(t){ return num(t.dp); })
                              .filter(function(n){ return !isNaN(n) && n > 0; });
  var ppDepth = tbDepths.length ? Math.max.apply(null, tbDepths) : null;
  var ppLabel = isPacker ? 'Top of Packer Depth' : 'Top of Pump Depth';

  // 5. TAC depth — Tubing Anchor Catcher. Match "TAC" as a whole word OR
  //    "Tubing Anchor"; exclude "Mud Anchor" / mud-anchor variants.
  //    Sanity floor: TACs sit several hundred to thousands of feet down;
  //    anything < 100 ft is almost certainly a missing-digit WBD entry,
  //    so we treat it as missing rather than render a misleading value.
  var TAC_MIN_DEPTH = 100;
  var tacDepth = null;
  (v.tb || []).forEach(function(t) {
    var d = t.desc || '';
    if (/mud\s+anchor/i.test(d)) return;
    if (!/\bTAC\b|tubing\s+anchor/i.test(d)) return;
    var n = num(t.dp);
    if (!isNaN(n) && n >= TAC_MIN_DEPTH && (tacDepth == null || n < tacDepth)) tacDepth = n;
  });

  function row(label, value, suffix) {
    var has = value != null && value !== '';
    var disp = has ? (esc(value) + (suffix || '')) : '—';
    return '<tr><td class="lbl">' + esc(label) + '</td>'
         + '<td class="val' + (has ? '' : ' none') + '">' + disp + '</td></tr>';
  }

  body.innerHTML =
    '<table class="info-table"><tbody>'
    + row('Production Casing Size', prodSize)
    + row('Tubing Size', tbSizes.length ? tbSizes.join('  /  ') : null)
    + row('Top Perf', topPerf != null ? topPerf.toLocaleString() : null, " ft")
    + row(ppLabel, ppDepth != null ? ppDepth.toLocaleString() : null, " ft")
    + row('TAC Depth', tacDepth != null ? tacDepth.toLocaleString() : null, " ft")
    + '</tbody></table>';
}

// ── Session resume ──────────────────────────────────────────────────────────
(function () {
  try {
    var saved = localStorage.getItem(SESSION_KEY);
    if (saved) {
      var session = JSON.parse(saved);
      if (session.expires > Date.now()) { showApp(session); return; }
      localStorage.removeItem(SESSION_KEY);
    }
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
})();
</script>
