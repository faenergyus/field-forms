<title>Spare Vessels — FAE Field Operations</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4f1;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Login overlay ── */
    #login-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0d260d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
    }
    #login-overlay .login-logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; color: #5dc85d; }
    #login-overlay .login-logo span { color: #fff; font-weight: 300; }
    #login-overlay .login-tagline { color: #90bc90; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; margin-top: -16px; }
    #login-overlay .login-tagline em { color: #5dc85d; font-style: normal; }
    #login-overlay .login-title { color: #c8dcc8; font-size: 1rem; margin-bottom: 8px; }
    #login-overlay .login-error { color: #ff8080; font-size: 0.85rem; display: none; text-align: center; max-width: 280px; }

    /* ── Header ── */
    header {
      background: #d9d9d9;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .logo-img { height: 48px; display: block; }
    .user-badge { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #5dc85d; }
    .user-name { color: #1f1f1f; font-size: 0.82rem; }
    .user-signout { color: #3a3a3a; font-size: 0.72rem; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; margin-left: 4px; }

    /* ── Layout ── */
    .page { max-width: 1020px; margin: 0 auto; padding: 24px 18px 60px; }

    .page-subtitle {
      font-size: 0.75rem; color: #6a8a6a; margin-bottom: 24px;
      letter-spacing: 0.04em;
    }

    /* ── Refresh button ── */
    .refresh-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #2d7a2d; color: #fff;
      border: none; border-radius: 8px;
      padding: 8px 18px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; letter-spacing: 0.03em;
      transition: background 0.15s, transform 0.1s;
    }
    .refresh-btn:hover { background: #236a23; transform: translateY(-1px); }
    .refresh-btn:active { transform: translateY(0); }
    .refresh-btn:disabled { background: #7aaa7a; cursor: default; transform: none; }

    /* ── Report container ── */
    .report-container {
      background: #fff; border-radius: 9px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-top: 20px;
    }
    .report-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
    }
    .report-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #3a5a3a; }
    .report-count { font-size: 0.7rem; color: #8aaa8a; }

    /* ── Table ── */
    .report-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .report-table th {
      text-align: left; font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: #6a8a6a; font-weight: 700;
      border-bottom: 1.5px solid #e0ece0; padding: 8px 10px;
    }
    .report-table td { padding: 10px 10px; border-bottom: 1px solid #f0f4f0; vertical-align: middle; }
    .report-table tr:last-child td { border-bottom: none; }
    .report-table tr:hover td { background: #f8fbf8; }
    .report-thumb {
      width: 72px; height: 72px; object-fit: cover; border-radius: 6px;
      cursor: pointer; border: 1.5px solid #e0ece0; display: block;
      transition: transform 0.15s;
    }
    .report-thumb:hover { transform: scale(1.05); }
    .report-thumb-none {
      width: 72px; height: 72px; background: #f0f4f0; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; font-size: 1.6rem;
    }
    .maps-link { color: #2d7a2d; text-decoration: none; font-weight: 500; white-space: nowrap; }
    .maps-link:hover { text-decoration: underline; }
    .no-gps { color: #bbb; font-size: 0.75rem; }
    .used-cell { text-align: center; }
    .used-checkbox { width: 20px; height: 20px; cursor: pointer; accent-color: #2d7a2d; }
    .used-checkbox:disabled { opacity: 0.4; cursor: default; }
    tr.row-used td { background: #f0fbf0; }
    tr.row-used:hover td { background: #e8f8e8; }

    /* ── States ── */
    .report-loading { color: #6a8a6a; font-size: 0.85rem; padding: 40px; text-align: center; }
    .report-empty { color: #8aaa8a; font-size: 0.85rem; padding: 40px; text-align: center; }
    .report-error { color: #c0392b; font-size: 0.85rem; padding: 40px; text-align: center; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #fff; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; color: #8aaa8a; font-size: 0.72rem; margin-top: 36px; padding-top: 16px; border-top: 1px solid #d0e0d0; }

    @media (max-width: 620px) {
      .report-table th:nth-child(3),
      .report-table td:nth-child(3) { display: none; }
    }
    @media (max-width: 440px) {
      .report-table th:nth-child(5),
      .report-table td:nth-child(5) { display: none; }
    }
  </style>
  <link rel="stylesheet" href="chrome.css">
  <script>
(function () {
  var SITE = location.host.split('.')[0]; // "analyst" | "scada" | "forms"
  function readPos() {
    var m = document.cookie.match(/(?:^|; )fae40_pos=([^;]+)/);
    if (!m) return {};
    try { return JSON.parse(decodeURIComponent(m[1])); } catch (e) { return {}; }
  }
  function writePos(o) {
    document.cookie = 'fae40_pos=' + encodeURIComponent(JSON.stringify(o)) +
      '; domain=.40ac.us; path=/; max-age=2592000; Secure; SameSite=Lax';
  }
  var pos = readPos();
  // 1. record our own current location
  pos[SITE] = location.pathname + location.search;
  writePos(pos);
  // 2. patch cross-app links on the page
  function patchLinks() {
    document.querySelectorAll('a[href]').forEach(function (a) {
      var m = a.href.match(/^https:\/\/(analyst|scada|forms)\.40ac\.us\/?(?:[?#]|$)/);
      if (m && m[1] !== SITE && pos[m[1]]) {
        a.href = 'https://' + m[1] + '.40ac.us' + pos[m[1]];
      }
    });
  }
  if (document.readyState !== 'loading') patchLinks();
  else document.addEventListener('DOMContentLoaded', patchLinks);
})();
</script>
</head>
<body>

<!-- ── Login overlay ── -->
<div id="login-overlay">
  <div>
    <div class="login-logo">fae<span>II</span></div>
  </div>
  <div class="login-tagline">forty acres <em>energy</em> &nbsp;·&nbsp; Field Operations Portal</div>
  <div class="login-title">Sign in to continue</div>

       data-client_id="629380732564-eh0uasomqjdo3up8o2po685g9ep544iq.apps.googleusercontent.com"

<header class="appchrome">

<div class="page">
  <div class="page-subtitle">Inventory of spare tanks, vessels, and separators in the field</div>

  <div class="report-container" id="reportContainer">
    <div class="report-header">
      <div class="report-title">🛢 Spare Vessels</div>
      <div style="display:flex;align-items:center;gap:12px">

        <button class="refresh-btn" id="refreshBtn" onclick="loadReport()" style="display:none">↻ Refresh</button>

</div>

<script>
// ── Auth ──────────────────────────────────────────────────────────────────
const ACCOUNTS_CSV = 'https://docs.google.com/spreadsheets/d/146yuHYjs3RF3wtCK3Qj9NXH94DrStwhieTGqPeLQRfA/gviz/tq?tqx=out:csv&sheet=Accounts';
const TRACKER_URL  = 'https://script.google.com/macros/s/AKfycbxOyZbt18JXuPTvkkJrZ3jJgM_xOMQ035CmQWJDolIuEqVKHFP1hNZfbmlcp6dY32Zprw/exec';
const SESSION_KEY  = 'fae_user';
const SESSION_HRS  = 720;  // 30 days
// ── Cross-subdomain SSO (self-healing .40ac.us cookie bridge) ──────────
// One Google sign-in covers analyst / scada / forms.40ac.us. On load:
// cookie→localStorage seed; if local session valid but cookie missing,
// re-write the cookie (self-heal); intercept setItem/removeItem to keep
// the cookie in sync with the localStorage session.
(function () {
  try {
    var m = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    if (m && !localStorage.getItem(SESSION_KEY))
      localStorage.setItem(SESSION_KEY, decodeURIComponent(m[1]));
  } catch (e) {}
  // Stale -> replace: if the .40ac.us cookie carries a fresh fae1.* token but
  // localStorage still holds a stale credential (e.g. an expired Google JWT),
  // replace LS so the session-resume / /auth/session call sees the fresh token.
  try {
    var _scm = document.cookie.match(/(?:^|;\s*)fae40_sso=([^;]+)/);
    var cookieTok = _scm ? decodeURIComponent(_scm[1]) : null;
    var lsRaw = localStorage.getItem(SESSION_KEY);
    var lsObj = null; try { lsObj = JSON.parse(lsRaw || 'null'); } catch (e) {}
    var lsCred = lsObj && lsObj.credential;
    if (cookieTok && cookieTok.indexOf('fae1.') === 0
        && (!lsCred || lsCred.indexOf('fae1.') !== 0)) {
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        credential: cookieTok,
        source: 'sso-self-heal'
      }));
    }
  } catch (e) {}
  try {
    var hasCookie = /(?:^|;\s*)fae40_sso=/.test(document.cookie);
    var raw = localStorage.getItem(SESSION_KEY);
    if (!hasCookie && raw) {
      var s = null; try { s = JSON.parse(raw); } catch (e) {}
      if (s && s.credential && s.expires && s.expires > Date.now()) {
        document.cookie = 'fae40_sso=' + encodeURIComponent(raw) +
          ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax';
      }
    }
  } catch (e) {}
  try {
    var _set = localStorage.setItem.bind(localStorage);
    var _rem = localStorage.removeItem.bind(localStorage);
    localStorage.setItem = function (k, v) {
      _set(k, v);
      if (k === SESSION_KEY) { try { document.cookie = 'fae40_sso=' +
        encodeURIComponent(v) + ';domain=.40ac.us;path=/;max-age=2592000;Secure;SameSite=Lax'; } catch (e) {} }
    };
    localStorage.removeItem = function (k) {
      _rem(k);
      if (k === SESSION_KEY) { try { document.cookie =
        'fae40_sso=;domain=.40ac.us;path=/;max-age=0;Secure;SameSite=Lax'; } catch (e) {} }
    };
  } catch (e) {}
})();
(function migrateLegacySession() {
  try {
    if (localStorage.getItem(SESSION_KEY)) return;
    for (const k of ['fae_portal_user', 'fae_scada_user']) {
      const v = localStorage.getItem(k);
      if (v) { localStorage.setItem(SESSION_KEY, v); localStorage.removeItem(k); return; }
    }
  } catch(e) {}
})();

function parseAccountsCSV(text) {
  const lines = text.trim().split('\n');
  return lines.slice(1).map(line => {
    const cols = line.match(/("(?:[^"]|"")*"|[^,]*)/g).map(c => c.replace(/^"|"$/g,'').trim());
    return { email: cols[0], displayName: cols[1], pbiName: cols[2], role: cols[3] };
  });
}

async function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  const email   = payload.email.toLowerCase();
  const picture = payload.picture;
  const errorEl = document.getElementById('login-error');
  errorEl.style.cssText = 'display:block;color:#90bc90';
  errorEl.textContent   = 'Checking access…';
  try {
    const csv   = await fetch(ACCOUNTS_CSV).then(r => r.text());
    const rows  = parseAccountsCSV(csv);
    const match = rows.find(r => r.email.toLowerCase() === email && r.email !== 'x');
    if (!match) {
      errorEl.style.color = '#ff8080';
      errorEl.textContent = `Access denied for ${email}. Contact Ryan Swift to request access.`;
      return;
    }
    const session = { email, displayName: match.displayName, pbiName: match.pbiName,
                      role: match.role, picture, expires: Date.now() + SESSION_HRS * 3600000 };
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    fetch(TRACKER_URL, { method:'POST', body: JSON.stringify({ email }) }).catch(() => {});
    showPortal(session);
    loadReport();
  } catch(e) {
    errorEl.style.color = '#ff8080';
    errorEl.textContent = 'Could not verify access. Check your connection and try again.';
  }
}

function showPortal(session) {
  document.getElementById('login-overlay').style.display = 'none';
  document.getElementById('user-badge').style.display    = 'flex';
  document.getElementById('user-name').textContent       = 'Welcome, ' + session.displayName;
  const av = document.getElementById('user-avatar');
  av.src = session.picture || ''; av.style.display = session.picture ? '' : 'none';
}

function signOut() {
  localStorage.removeItem(SESSION_KEY);
  location.reload();
}

// ── Report ────────────────────────────────────────────────────────────────
const REPORT_API = 'https://script.google.com/macros/s/AKfycbwOXsEqPyzT4PrIqQK0pJ4wgynFFbdA1EsJQNfmdglrRQXqWtycYlPtZVgqZHTJgU6o/exec';

function loadReport() {
  const btn    = document.getElementById('refreshBtn');
  const output = document.getElementById('report-output');
  const countEl = document.getElementById('reportCount');

  if (btn) btn.disabled = true;
  output.innerHTML = '<div class="report-loading">Loading…</div>';
  countEl.textContent = '';

  fetch(REPORT_API + '?report=spareVessels')
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        output.innerHTML = '<div class="report-error">Error: ' + data.error + '</div>';
        if (btn) { btn.style.display = 'inline-flex'; btn.disabled = false; btn.textContent = '↻ Retry'; }
        return;
      }
      renderTable(data.rows);
      if (btn) { btn.style.display = 'inline-flex'; btn.disabled = false; }
    })
    .catch(() => {
      output.innerHTML = '<div class="report-error">Failed to load. Check your connection and try again.</div>';
      if (btn) { btn.style.display = 'inline-flex'; btn.disabled = false; btn.textContent = '↻ Retry'; }
    });
}

function renderTable(rows) {
  const output = document.getElementById('report-output');
  const countEl = document.getElementById('reportCount');

  if (!rows || !rows.length) {
    output.innerHTML = '<div class="report-empty">No entries yet.</div>';
    countEl.textContent = '';
    return;
  }

  countEl.textContent = rows.length + ' vessel' + (rows.length !== 1 ? 's' : '');

  let html = '<div style="overflow-x:auto"><table class="report-table"><thead><tr>'
    + '<th>Photo</th><th>Location</th><th>Size</th><th>Coordinates</th><th>Reporter</th><th>Date</th><th>Picked Up</th>'
    + '</tr></thead><tbody>';

  rows.forEach(r => {
    const thumb = r.thumbUrl
      ? `<a href="${r.photoUrl}" target="_blank"><img class="report-thumb" src="${r.thumbUrl}" alt="photo" loading="lazy" onerror="this.closest('a').outerHTML='<div class=report-thumb-none>📷</div>'"></a>`
      : `<div class="report-thumb-none">📷</div>`;

    let coords = '<span class="no-gps">No GPS</span>';
    if (r.lat && r.lng) {
      const latF = parseFloat(r.lat).toFixed(5);
      const lngF = parseFloat(r.lng).toFixed(5);
      coords = `<a class="maps-link" href="https://maps.google.com/?q=${r.lat},${r.lng}" target="_blank">📍 ${latF}, ${lngF}</a>`;
    }

    const size = [r.height ? r.height + ' ft' : '', r.diameter ? r.diameter + ' in' : ''].filter(Boolean).join(' × ') || '—';
    const reporter = r.reporter || '—';

    const usedChecked = r.used ? 'checked' : '';
    const rowClass = r.used ? 'row-used' : '';
    html += `<tr class="${rowClass}">
      <td>${thumb}</td>
      <td>${r.location || '—'}</td>
      <td>${size}</td>
      <td>${coords}</td>
      <td>${reporter}</td>
      <td>${r.timestamp}</td>
      <td class="used-cell"><input type="checkbox" class="used-checkbox" ${usedChecked} onchange="toggleUsed(${r.rowNum}, this.checked, this)"></td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  output.innerHTML = html;
}

function toggleUsed(rowNum, checked, el) {
  el.disabled = true;
  const row = el.closest('tr');
  fetch(REPORT_API + '?action=setUsed&row=' + rowNum + '&used=' + (checked ? 1 : 0))
    .then(r => r.json())
    .then(data => {
      el.disabled = false;
      if (data.error) { el.checked = !checked; return; }
      if (row) { row.className = checked ? 'row-used' : ''; }
    })
    .catch(() => {
      el.disabled = false;
      el.checked = !checked;
    });
}

// ── Session check (runs last so REPORT_API and all functions are defined) ──
(function () {
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    if (saved) {
      const session = JSON.parse(saved);
      if (session.expires > Date.now()) { showPortal(session); loadReport(); return; }
      localStorage.removeItem(SESSION_KEY);
    }
  } catch(e) { localStorage.removeItem(SESSION_KEY); }
})();
</script>
<script src="chrome.js"></script>
